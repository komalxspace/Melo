function OnboardingFlow({ onComplete }) {
  const [step, setStep]           = useState(0);
  const [homeCount, setHomeCount] = useState(null);
  const [homeNames, setHomeNames] = useState(['My Home', 'Parents', '']);
  const emojis = ['🏠','🌸','💜','🏡','✨'];

  const pickCount = (n) => {
    setHomeCount(n);
    const defaults = ['My Home','Parents','In-Laws','Hostel','My Place'];
    setHomeNames(defaults.slice(0, n));
  };

  const updateName = (i, v) => {
    const u = [...homeNames]; u[i] = v; setHomeNames(u);
  };

  const handleDone = () => {
    const names = homeNames.map(n => n.trim()).filter(Boolean);
    onComplete(names.length ? names : ['My Home']);
  };

  if (step === 0) return (
    <div style={{ minHeight:'100vh', background:CREAM, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'space-between', padding:'48px 28px 52px' }}>
      <div style={{ textAlign:'center' }}>
        <div style={{ width:52, height:52, borderRadius:16, background:'#1a1816', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto', boxShadow:'0 4px 16px rgba(26,24,22,0.16)' }}>
          <span style={{ fontSize:26, lineHeight:1 }}>👜</span>
        </div>
      </div>

      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', width:'100%', padding:'20px 0' }}>
        <img src={ILL_WARDROBE} alt="" style={{ width:'100%', maxWidth:300, height:'auto' }}/>
      </div>

      <div style={{ width:'100%', maxWidth:400 }}>
        <h1 className="serif" style={{ fontSize:27, fontWeight:600, color:'#1a1816', margin:'0 0 12px', lineHeight:1.3, letterSpacing:'-0.3px' }}>
          Ever visited family and realised you left half your clothes behind?
        </h1>
        <p style={{ fontSize:15, color:'#1a1816', fontWeight:600, margin:'0 0 8px' }}>Potli fixes that.</p>
        <p style={{ fontSize:14, color:'#a8a29e', margin:'0 0 28px', lineHeight:1.65 }}>
          Know exactly what's at home, at your parents', hostel, in-laws, wherever — so you always pack right.
        </p>
        <button onClick={() => setStep(1)} style={{ ...btnReset, width:'100%', padding:'16px', borderRadius:16, background:'#1a1816', color:'#f5f3ef', fontSize:15, fontWeight:600, justifyContent:'center', cursor:'pointer' }}>
          Let's set it up →
        </button>
        <p style={{ fontSize:11, color:'#c4b8a8', textAlign:'center', marginTop:14 }}>Takes less than a minute</p>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:'100vh', background:CREAM, display:'flex', flexDirection:'column', padding:'48px 28px 52px' }}>
      <div style={{ textAlign:'center', marginBottom:24 }}>
        <img src={ILL_HOMES} alt="" style={{ width:'100%', maxWidth:280, height:'auto', margin:'0 auto', display:'block' }}/>
      </div>

      <h2 className="serif" style={{ fontSize:26, fontWeight:600, color:'#1a1816', margin:'0 0 6px', letterSpacing:'-0.2px' }}>
        How many homes?
      </h2>
      <p style={{ fontSize:14, color:'#a8a29e', margin:'0 0 22px', lineHeight:1.5 }}>
        How many places do you keep clothes at?
      </p>

      <div style={{ display:'flex', gap:10, marginBottom:24 }}>
        {[2,3,4,5].map(n => (
          <button key={n} onClick={() => pickCount(n)} style={{
            ...btnReset, flex:1, padding:'14px 0', borderRadius:14, cursor:'pointer',
            fontSize:18, fontWeight:600, transition:'all .15s',
            background: homeCount===n ? '#1a1816' : CARD,
            color: homeCount===n ? '#f5f3ef' : '#5c5652',
            boxShadow: homeCount===n ? '0 2px 10px rgba(26,24,22,0.18)' : '0 1px 4px rgba(44,42,38,0.08)',
          }}>
            {n}
          </button>
        ))}
      </div>

      {homeCount && (
        <div className="fade-up" style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:28 }}>
          {homeNames.map((name, i) => (
            <div key={i} style={{ display:'flex', alignItems:'center', gap:12, background:CARD, borderRadius:14, padding:'13px 16px', boxShadow:'0 1px 4px rgba(44,42,38,0.07)' }}>
              <span style={{ fontSize:22, flexShrink:0 }}>{emojis[i % emojis.length]}</span>
              <input
                value={name}
                onChange={e => updateName(i, e.target.value)}
                placeholder={`Home ${i+1} name`}
                style={{ flex:1, border:'none', outline:'none', fontSize:14, fontWeight:500, color:'#1a1816', background:'transparent' }}
              />
            </div>
          ))}
        </div>
      )}

      <div style={{ marginTop:'auto' }}>
        <button onClick={handleDone} disabled={!homeCount} style={{
          ...btnReset, width:'100%', padding:'16px', borderRadius:16, cursor:homeCount?'pointer':'not-allowed',
          background: homeCount ? '#1a1816' : '#e0d8cf',
          color: homeCount ? '#f5f3ef' : '#a8a29e',
          fontSize:15, fontWeight:600, justifyContent:'center', transition:'all .15s',
        }}>
          Take me in →
        </button>
      </div>
    </div>
  );
}

// ─── DEFERRED SIGN-UP SHEET ────────────────────────────────────────────────────
function SignUpSheet({ onAuth, onSkip }) {
  const [name, setName]         = useState('');
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [showPass, setShowPass] = useState(false);
  const [error, setError]       = useState('');
  const [submitting, setSubmitting] = useState(false);

  const inp = {
    width:'100%', padding:'12px 14px', background:CREAM,
    border:'1px solid rgba(44,42,38,0.12)', borderRadius:12,
    fontSize:14, color:'#1a1816', outline:'none', boxSizing:'border-box',
  };

  const handleSubmit = async () => {
    setError('');
    if (!email.trim() || !password.trim() || !name.trim()) { setError('Please fill in all fields.'); return; }
    if (password.length < 6) { setError('Password must be at least 6 characters.'); return; }
    setSubmitting(true);
    try {
      const { data, error: err } = await supabase.auth.signUp({
        email: email.trim().toLowerCase(), password,
        options: { data: { name: name.trim() } }
      });
      if (err) { setError(err.message); setSubmitting(false); return; }
      if (data.user) onAuth({ id: data.user.id, email: data.user.email, name: name.trim() });
    } catch(e) { setError('Something went wrong. Try again.'); }
    setSubmitting(false);
  };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(26,24,22,0.45)', backdropFilter:'blur(4px)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:60 }}>
      <div style={{ background:CARD, width:'100%', maxWidth:560, borderRadius:'26px 26px 0 0', padding:'24px 22px 36px' }}>
        <div style={{ textAlign:'center', marginBottom:20 }}>
          <div style={{ fontSize:28, marginBottom:8 }}>☁️</div>
          <h2 className="serif" style={{ fontSize:20, fontWeight:600, color:'#1a1816', margin:'0 0 4px' }}>Save your Potli</h2>
          <p style={{ fontSize:13, color:'#a8a29e', margin:0 }}>Sync your wardrobe across all your devices</p>
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:14 }}>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" style={inp}/>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email address" style={inp}/>
          <div style={{ position:'relative' }}>
            <input type={showPass?'text':'password'} value={password} onChange={e=>setPassword(e.target.value)}
              placeholder="Password (min. 6 chars)" style={{...inp, paddingRight:44}}
              onKeyDown={e=>{if(e.key==='Enter')handleSubmit();}}/>
            <button onClick={()=>setShowPass(p=>!p)}
              style={{...btnReset,position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:'#a8a29e',cursor:'pointer'}}>
              <Eye size={15} strokeWidth={1.8}/>
            </button>
          </div>
          {error && <div style={{fontSize:12,color:'#c0392b',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:'8px 12px'}}>{error}</div>}
        </div>

        <button onClick={handleSubmit} disabled={submitting} style={{
          ...btnReset, width:'100%', padding:'15px', borderRadius:14, cursor:submitting?'not-allowed':'pointer',
          background:submitting?'#d6cfc6':'#1a1816', color:'#f5f3ef',
          fontSize:14, fontWeight:600, justifyContent:'center', marginBottom:10,
        }}>
          {submitting ? '…' : 'Create Account & Save'}
        </button>

        <button onClick={onSkip} style={{
          ...btnReset, width:'100%', padding:'12px', borderRadius:14, cursor:'pointer',
          color:'#a8a29e', fontSize:13, fontWeight:500, justifyContent:'center',
        }}>
          Maybe later — save on this device only
        </button>
      </div>
    </div>
  );
}


// ─── AUTH SCREEN (Supabase) ───────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [mode, setMode]         = useState('signin');
  const [name, setName]         = useState('');
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [showPass, setShowPass] = useState(false);
  const [error, setError]       = useState('');
  const [submitting, setSubmitting] = useState(false);

  const inp = {
    width:'100%', padding:'13px 14px', background:'#fff',
    border:'1px solid rgba(44,42,38,0.12)', borderRadius:12,
    fontSize:14, color:'#1a1816', outline:'none', boxSizing:'border-box',
  };
  const lbl = { fontSize:10, letterSpacing:'0.1em', fontWeight:600, textTransform:'uppercase', color:'#a8a29e', display:'block', marginBottom:6 };

  const handleSubmit = async () => {
    setError('');
    if (!email.trim() || !password.trim()) { setError('Please fill in all fields.'); return; }
    if (mode === 'signup' && !name.trim()) { setError('Please enter your name.'); return; }
    if (password.length < 6) { setError('Password must be at least 6 characters.'); return; }
    setSubmitting(true);
    try {
      if (mode === 'signup') {
        const { data, error: err } = await supabase.auth.signUp({
          email: email.trim().toLowerCase(),
          password,
          options: { data: { name: name.trim() } }
        });
        if (err) { setError(err.message); setSubmitting(false); return; }
        if (data.user) onAuth({ id: data.user.id, email: data.user.email, name: name.trim() });
      } else {
        const { data, error: err } = await supabase.auth.signInWithPassword({
          email: email.trim().toLowerCase(), password
        });
        if (err) { setError(err.message); setSubmitting(false); return; }
        const meta = data.user?.user_metadata;
        onAuth({ id: data.user.id, email: data.user.email, name: meta?.name || '' });
      }
    } catch(e) { setError('Something went wrong. Please try again.'); }
    setSubmitting(false);
  };

  return (
    <div style={{ minHeight:'100vh', background:'#FAF7F2', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'24px 24px 56px' }}>
      <div className="auth-up" style={{ textAlign:'center', marginBottom:36, animationDelay:'.05s' }}>
        <div style={{ width:58, height:58, borderRadius:18, background:'#1a1816', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 14px', boxShadow:'0 4px 18px rgba(26,24,22,0.18)' }}>
          <span style={{ fontSize:28, lineHeight:1 }}>👜</span>
        </div>
        <h1 className="serif" style={{ fontSize:30, fontWeight:600, color:'#1a1816', margin:0, letterSpacing:'-0.3px' }}>Potli</h1>
        <p style={{ fontSize:13, color:'#a8a29e', marginTop:7 }}>
          {mode === 'signin' ? 'Welcome back' : 'Track your clothes across every home'}
        </p>
      </div>

      <div className="auth-up" style={{ width:'100%', maxWidth:380, background:'#fff', borderRadius:24, padding:'26px 22px 22px', boxShadow:'0 2px 24px rgba(44,42,38,0.09)', animationDelay:'.12s' }}>
        <div style={{ display:'flex', background:'#f5f3ef', borderRadius:12, padding:3, marginBottom:22, gap:3 }}>
          {[['signin','Sign In'],['signup','Create Account']].map(([m, label]) => (
            <button key={m} onClick={() => { setMode(m); setError(''); }}
              style={{ flex:1, padding:'9px 6px', borderRadius:10, border:'none', cursor:'pointer', fontSize:12, fontWeight:500, transition:'all .18s',
                background: mode===m ? '#fff' : 'transparent', color: mode===m ? '#1a1816' : '#a8a29e',
                boxShadow: mode===m ? '0 1px 4px rgba(44,42,38,0.1)' : 'none' }}>
              {label}
            </button>
          ))}
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {mode === 'signup' && (
            <div>
              <span style={lbl}>Full Name</span>
              <input value={name} onChange={e => setName(e.target.value)} placeholder="Priya Sharma" style={inp} onKeyDown={e => e.key==='Enter' && handleSubmit()}/>
            </div>
          )}
          <div>
            <span style={lbl}>Email</span>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@email.com" style={inp} onKeyDown={e => e.key==='Enter' && handleSubmit()}/>
          </div>
          <div>
            <span style={lbl}>Password</span>
            <div style={{ position:'relative' }}>
              <input type={showPass ? 'text' : 'password'} value={password} onChange={e => setPassword(e.target.value)}
                placeholder={mode==='signup' ? 'Min. 6 characters' : '••••••••'} style={{ ...inp, paddingRight:44 }}
                onKeyDown={e => e.key==='Enter' && handleSubmit()}/>
              <button onClick={() => setShowPass(p => !p)}
                style={{ position:'absolute', right:13, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', padding:0, display:'flex', alignItems:'center', color:'#a8a29e' }}>
                {showPass ? <EyeOff size={15} strokeWidth={1.8}/> : <Eye size={15} strokeWidth={1.8}/>}
              </button>
            </div>
          </div>

          {error && (
            <div style={{ background:'#fef2f2', border:'1px solid #fecaca', borderRadius:10, padding:'9px 12px', fontSize:12, color:'#c0392b', fontWeight:500 }}>
              {error}
            </div>
          )}

          <button onClick={handleSubmit} disabled={submitting}
            style={{ width:'100%', padding:'14px', borderRadius:12, border:'none', cursor: submitting ? 'not-allowed' : 'pointer',
              fontSize:14, fontWeight:600, letterSpacing:'0.02em', marginTop:2,
              background: submitting ? '#d6cfc6' : '#1a1816', color:'#f5f3ef' }}>
            {submitting ? '…' : mode==='signin' ? 'Sign In' : 'Create Account'}
          </button>
        </div>
      </div>

      <p className="auth-up" style={{ fontSize:11, color:'#c4b8a8', marginTop:18, textAlign:'center', lineHeight:1.6, animationDelay:'.2s' }}>
        Your photos stay on this device.<br/>Account data syncs securely to the cloud.
      </p>
    </div>
  );
}

const makeClothSvg = (type, color) => {
  if (CLOTH_ILLUSTRATIONS[type]) return CLOTH_ILLUSTRATIONS[type];
  const colorMap = {
    'White':'#F5F3EF','Black':'#2C2A26','Blue':'#5B7CA3','Red':'#B85450','Green':'#7A8B6F',
    'Yellow':'#D4A85C','Pink':'#D89AAB','Navy':'#3A4A66','Grey':'#9C9A95','Brown':'#7A5C42',
    'Maroon':'#7A3838','Beige':'#D4C5A0','Floral':'#E0A8B5','Light blue':'#A8C0D4','Mixed':'#B5A8C0',
  };
  const c = colorMap[color] || '#C8D9C0';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#FBF6F0"/><rect x="25" y="25" width="50" height="65" fill="${c}" stroke="rgba(44,42,38,0.2)" stroke-width="0.8" rx="4"/></svg>`;
  return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
};

// ─── SETTINGS SUB-PAGES (proper React components with their own state) ─────────

function ManageHomes({ houses, hCounts, onRename, onAdd, onDelete, onBack }) {
  const [newName, setNewName] = useState('');
  const handleAdd = () => {
    const trimmed = newName.trim();
    if (!trimmed) return;
    onAdd(trimmed);
    setNewName('');
  };
  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:22}}>
        <button onClick={onBack} style={{...btnReset,padding:4}}><ChevronLeft size={18} color="#a8a29e" strokeWidth={1.8}/></button>
        <h2 className="serif" style={{margin:0,fontSize:18,fontWeight:600,color:'#1a1816'}}>Manage Homes</h2>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
        {houses.map((h, i) => (
          <HomeRow key={i} index={i} value={h} count={hCounts[i]} canDelete={houses.length > 1}
            onSave={(v) => onRename(i, v)} onDelete={() => onDelete(i)} />
        ))}
      </div>
      <div style={{display:'flex',gap:8}}>
        <input
          value={newName} onChange={e => setNewName(e.target.value)}
          placeholder="New home name…"
          onKeyDown={e => { if (e.key === 'Enter') handleAdd(); }}
          style={{flex:1,padding:'10px 12px',background:CARD,border:'1px solid rgba(44,42,38,0.12)',borderRadius:10,fontSize:13,color:'#1a1816',outline:'none',fontFamily:"'Inter',system-ui"}}
        />
        <button onClick={handleAdd} style={{...btnReset,background:GOLD,color:'#fff',padding:'10px 16px',borderRadius:10,fontSize:12,fontWeight:600,cursor:'pointer'}}>
          Add
        </button>
      </div>
    </div>
  );
}

function ManageCategories({ categories, catCounts, onAddCat, onRemoveCat, onSelectCat, onBack }) {
  const [newName, setNewName] = useState('');
  const handleAdd = () => {
    const trimmed = newName.trim();
    if (!trimmed || categories[trimmed]) return;
    onAddCat(trimmed);
    setNewName('');
  };
  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:22}}>
        <button onClick={onBack} style={{...btnReset,padding:4}}><ChevronLeft size={18} color="#a8a29e" strokeWidth={1.8}/></button>
        <h2 className="serif" style={{margin:0,fontSize:18,fontWeight:600,color:'#1a1816'}}>Categories & Types</h2>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
        {Object.keys(categories).map(cat => (
          <div key={cat} style={{display:'flex',alignItems:'center',background:CARD,borderRadius:12,padding:'11px 14px',border:'1px solid rgba(44,42,38,0.07)'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:500,color:'#1a1816'}}>{cat}</div>
              <div style={{fontSize:11,color:'#a8a29e',marginTop:2}}>{(categories[cat]||[]).length} types · {catCounts[cat]||0} items</div>
            </div>
            <button onClick={() => onSelectCat(cat)} style={{...btnReset,padding:'4px 6px'}}>
              <ChevronRight size={15} color="#c4b8a8" strokeWidth={1.8}/>
            </button>
            <button onClick={() => onRemoveCat(cat)} style={{...btnReset,padding:'4px 4px',marginLeft:2}}>
              <Trash2 size={13} color="#dac8b8" strokeWidth={1.8}/>
            </button>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8}}>
        <input
          value={newName} onChange={e => setNewName(e.target.value)}
          placeholder="New category name…"
          onKeyDown={e => { if (e.key === 'Enter') handleAdd(); }}
          style={{flex:1,padding:'10px 12px',background:CARD,border:'1px solid rgba(44,42,38,0.12)',borderRadius:10,fontSize:13,color:'#1a1816',outline:'none',fontFamily:"'Inter',system-ui"}}
        />
        <button onClick={handleAdd} style={{...btnReset,background:GOLD,color:'#fff',padding:'10px 16px',borderRadius:10,fontSize:12,fontWeight:600,cursor:'pointer'}}>
          Add
        </button>
      </div>
    </div>
  );
}

function CategoryDetail({ catName, types, onRename, onAddType, onRemoveType, onBack }) {
  const [newType, setNewType] = useState('');
  const [editName, setEditName] = useState(catName);
  const handleAddType = () => {
    const t = newType.trim();
    if (!t || types.includes(t)) return;
    onAddType(t);
    setNewType('');
  };
  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:22}}>
        <button onClick={onBack} style={{...btnReset,padding:4}}><ChevronLeft size={18} color="#a8a29e" strokeWidth={1.8}/></button>
        <h2 className="serif" style={{margin:0,fontSize:18,fontWeight:600,color:'#1a1816'}}>Edit Category</h2>
      </div>
      <div style={{marginBottom:20}}>
        <span style={labelStyle}>Category Name</span>
        <div style={{display:'flex',gap:8}}>
          <input value={editName} onChange={e => setEditName(e.target.value)}
            style={{flex:1,padding:'10px 12px',background:CARD,border:'1px solid rgba(44,42,38,0.12)',borderRadius:10,fontSize:13,color:'#1a1816',outline:'none',fontFamily:"'Inter',system-ui"}}/>
          <button onClick={() => onRename(catName, editName.trim())}
            style={{...btnReset,background:'#1a1816',color:'#f5f3ef',padding:'10px 14px',borderRadius:10,fontSize:12,fontWeight:600,cursor:'pointer'}}>
            Save
          </button>
        </div>
      </div>
      <span style={labelStyle}>Types</span>
      <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
        {types.length === 0 && <div style={{fontSize:12,color:'#a8a29e',padding:'8px 0'}}>No types yet — add one below.</div>}
        {types.map(t => (
          <div key={t} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',background:CARD,borderRadius:10,border:'1px solid rgba(44,42,38,0.07)'}}>
            <span style={{fontSize:13,color:'#1a1816'}}>{t}</span>
            <button onClick={() => onRemoveType(t)} style={{...btnReset,padding:4}}>
              <X size={13} color="#c4b8a8" strokeWidth={2}/>
            </button>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8}}>
        <input value={newType} onChange={e => setNewType(e.target.value)}
          placeholder="Add new type…"
          onKeyDown={e => { if (e.key === 'Enter') handleAddType(); }}
          style={{flex:1,padding:'10px 12px',background:CARD,border:'1px solid rgba(44,42,38,0.12)',borderRadius:10,fontSize:13,color:'#1a1816',outline:'none',fontFamily:"'Inter',system-ui"}}/>
        <button onClick={handleAddType} style={{...btnReset,background:GOLD,color:'#fff',padding:'10px 16px',borderRadius:10,fontSize:12,fontWeight:600,cursor:'pointer'}}>
          Add
        </button>
      </div>
    </div>
  );
}

function HomeRow({ index, value, count, canDelete, onSave, onDelete }) {
  const [v, setV] = useState(value);
  useEffect(() => setV(value), [value]);
  return (
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',background:CARD,borderRadius:12,border:'1px solid rgba(44,42,38,0.07)'}}>
      <input value={v} onChange={e => setV(e.target.value)} onBlur={() => v.trim() && onSave(v.trim())}
        onKeyDown={e => { if (e.key === 'Enter' && v.trim()) onSave(v.trim()); }}
        style={{flex:1,border:'none',outline:'none',fontSize:13,color:'#1a1816',background:'transparent',fontFamily:"'Inter',system-ui"}}/>
      <span style={{fontSize:10,color:'#a8a29e',fontWeight:500,whiteSpace:'nowrap'}}>{count} items</span>
      {canDelete && (
        <button onClick={onDelete} style={{...btnReset,padding:2}}>
          <Trash2 size={13} color="#dac8b8" strokeWidth={1.8}/>
        </button>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function WardrobeTracker() {
  const [session, setSession]           = useState(null);
  const [sessionChecked, setSessionChecked] = useState(false);
  const [syncError, setSyncError]       = useState('');
  const [clothes, setClothes]           = useState([]);
  const [houses, setHouses]             = useState(DEFAULT_HOUSES);
  const [categories, setCategories]     = useState(DEFAULT_CATEGORIES);
  const [profile, setProfile]           = useState({ name:'' });
  const [favorites, setFavorites]       = useState({});
  const [loading, setLoading]           = useState(true);

  const [activeHouse, setActiveHouse] = useState(null);
  const [filterCat, setFilterCat]     = useState('all');
  const [searchTerm, setSearchTerm]   = useState('');
  const [viewMode, setViewMode]       = useState('grid');
  const lastTap = useRef({});

  const [showAddModal, setShowAddModal]     = useState(false);
  const [editingItem, setEditingItem]       = useState(null);
  const [movingItem, setMovingItem]         = useState(null);
  const [showSettings, setShowSettings]     = useState(false);
  const [settingsPage, setSettingsPage]     = useState('main');
  const [activeCatEdit, setActiveCatEdit]   = useState(null);

  const [form, setForm]             = useState({ name:'', category:'Tops', subType:'', color:'', house:0, photo:'' });
  const [analyzing, setAnalyzing]   = useState(false);
  const [analyzeError, setAnalyzeError] = useState('');
  const [addStep, setAddStep]         = useState(0); // 0=type, 1=details, 2=home, 3=summary
  const fileInputRef = useRef(null);
  const [showOnboarding, setShowOnboarding] = useState(false);
  const [showSignUpSheet, setShowSignUpSheet] = useState(false);
  const [pendingSave, setPendingSave]       = useState(null);
  const [coachDismissed, setCoachDismissed] = useState(false);

  // ── Supabase auth — single source of truth ────────────────────────────────
  useEffect(() => {
    // onAuthStateChange fires immediately with current session (or null)
    // This replaces the need for a separate getSession() call
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, s) => {
      if (s) {
        const user = { id: s.user.id, email: s.user.email, name: s.user.user_metadata?.name || '' };
        setSession(user);
      } else {
        setSession(null);
        setClothes([]); setHouses(DEFAULT_HOUSES);
        setCategories(DEFAULT_CATEGORIES); setProfile({ name:'' }); setFavorites({});
        setLoading(false);
      }
      setSessionChecked(true);
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (session) { setLoading(true); loadAll(); }
  }, [session?.id]);

  useEffect(() => {
    if (!sessionChecked) return;
    const done = localStorage.getItem('potli-onboarded');
    if (!done && !session) setShowOnboarding(true);
  }, [sessionChecked]);

  // ── Photo helpers — stored locally by user+id ──────────────────────────────
  const photoKey  = (id) => `potli-photo-${session?.id}-${id}`;
  const getPhoto  = (id) => { try { return localStorage.getItem(photoKey(id)) || ''; } catch(e) { return ''; } };
  const savePhoto = (id, data) => { try { if (data) localStorage.setItem(photoKey(id), data); } catch(e) {} };
  const dropPhoto = (id) => { try { localStorage.removeItem(photoKey(id)); } catch(e) {} };

  // ── Load all cloud data ────────────────────────────────────────────────────
  const loadAll = async () => {
    try {
      const uid = session.id;

      // ── Houses ──────────────────────────────────────────────────────────────
      const { data: hRows, error: hErr } = await supabase
        .from('houses').select('*').eq('user_id', uid).order('position');
      if (hErr) console.warn('houses load:', hErr.message);
      if (hRows && hRows.length > 0) {
        setHouses(hRows.map(r => r.name));
      } else {
        await initDefaultHouses(uid);
      }

      // ── Clothes (schema-safe: works with house_position OR house_id columns) ─
      const { data: cRows, error: cErr } = await supabase
        .from('clothes').select('*').eq('user_id', uid).order('added_at');
      if (cErr) console.warn('clothes load:', cErr.message);
      if (cRows) {
        const items = cRows.map(r => ({
          id: r.id,
          name: r.name,
          category: r.category || '',
          subType: r.sub_type || '',
          color: r.color || '',
          // Support both old schema (house_id) and new (house_position)
          house: typeof r.house_position === 'number' ? r.house_position : 0,
          photo: getPhoto(r.id) || (r.sub_type ? makeClothSvg(r.sub_type, r.color) : ''),
          addedAt: r.added_at,
        }));
        setClothes(items);
      }

      // ── Categories ──────────────────────────────────────────────────────────
      const { data: catRows, error: catErr } = await supabase
        .from('categories').select('*').eq('user_id', uid);
      if (catErr) console.warn('categories load:', catErr.message);
      if (catRows && catRows.length > 0) {
        const catObj = {};
        catRows.forEach(r => { catObj[r.name] = r.types || []; });
        setCategories(catObj);
      } else {
        await initDefaultCategories(uid);
      }

      // ── Profile ─────────────────────────────────────────────────────────────
      const { data: prof } = await supabase
        .from('profiles').select('*').eq('id', uid).maybeSingle();
      if (prof) {
        setProfile({ name: prof.name || session.name || '' });
      } else {
        // First login on new device — create profile row
        await supabase.from('profiles')
          .insert({ id: uid, name: session.name || '' })
          .select().maybeSingle();
        setProfile({ name: session.name || '' });
      }

      // ── Favorites (device-local, lightweight) ────────────────────────────────
      try {
        const fv = localStorage.getItem(`potli-favs-${uid}`);
        if (fv) setFavorites(JSON.parse(fv));
      } catch(e) {}

    } catch(err) {
      console.error('loadAll error:', err);
      setSyncError('Could not load your data. Check internet connection.');
    }
    setLoading(false);
  };

  const initDefaultHouses = async (uid) => {
    const rows = DEFAULT_HOUSES.map((name, i) => ({ user_id: uid, name, position: i }));
    await supabase.from('houses').insert(rows);
    setHouses(DEFAULT_HOUSES);
  };

  const initDefaultCategories = async (uid) => {
    const rows = Object.entries(DEFAULT_CATEGORIES).map(([name, types]) => ({ user_id: uid, name, types }));
    await supabase.from('categories').insert(rows);
    setCategories(DEFAULT_CATEGORIES);
  };

  // ── Save helpers ───────────────────────────────────────────────────────────
  const saveClothes = async (items) => {
    setClothes(items);
    const uid = session?.id; if (!uid) return;

    if (items.length === 0) {
      // Delete everything for this user
      await supabase.from('clothes').delete().eq('user_id', uid);
      return;
    }

    // Upsert all current items (insert or update)
    const rows = items.map(item => ({
      id: item.id,
      user_id: uid,
      name: item.name,
      category: item.category || '',
      sub_type: item.subType || '',
      color: item.color || '',
      house_position: typeof item.house === 'number' ? item.house : 0,
      added_at: item.addedAt || new Date().toISOString(),
    }));
    const { error: upsertErr } = await supabase
      .from('clothes').upsert(rows, { onConflict: 'id' });
    if (upsertErr) { console.error('saveClothes upsert:', upsertErr.message); return; }

    // Delete any rows in DB that are no longer in the list
    const currentIds = items.map(i => i.id);
    const { data: dbRows } = await supabase
      .from('clothes').select('id').eq('user_id', uid);
    if (dbRows) {
      const toDelete = dbRows.map(r => r.id).filter(id => !currentIds.includes(id));
      if (toDelete.length) {
        await supabase.from('clothes').delete().in('id', toDelete);
        toDelete.forEach(id => dropPhoto(id));
      }
    }
  };

  const saveHouses = async (names) => {
    setHouses(names);
    const uid = session?.id; if (!uid) return;
    await supabase.from('houses').delete().eq('user_id', uid);
    const rows = names.map((name, i) => ({ user_id: uid, name, position: i }));
    await supabase.from('houses').insert(rows);
  };

  const saveCategories = async (catObj) => {
    setCategories(catObj);
    const uid = session?.id; if (!uid) return;
    await supabase.from('categories').delete().eq('user_id', uid);
    const rows = Object.entries(catObj).map(([name, types]) => ({ user_id: uid, name, types }));
    if (rows.length) await supabase.from('categories').insert(rows);
  };

  const saveProfile = async (p) => {
    setProfile(p);
    const uid = session?.id; if (!uid) return;
    await supabase.from('profiles')
      .upsert({ id: uid, name: p.name, updated_at: new Date().toISOString() },
               { onConflict: 'id' });
  };

  const saveFavs = (fv) => {
    setFavorites(fv);
    try { localStorage.setItem(`potli-favs-${session?.id}`, JSON.stringify(fv)); } catch(e) {}
  };

  // ── Auth ───────────────────────────────────────────────────────────────────
  const handleAuth = (user) => {
    setSession(user);
    setShowSignUpSheet(false);
    if (pendingSave) { setTimeout(() => { pendingSave(); setPendingSave(null); }, 400); }
  };

  const handleOnboardingComplete = (houseNames) => {
    setShowOnboarding(false);
    setHouses(houseNames);
    localStorage.setItem('potli-onboarded', '1');
    try { localStorage.setItem('potli-guest-houses', JSON.stringify(houseNames)); } catch(e) {}
    const names  = ['White Kurta','Red Saree','Navy Blazer','Blue Jeans','Green Lehenga'];
    const types  = ['Kurta','Saree','Blazer','Jeans','Lehenga'];
    const cats   = ['Indian Wear','Indian Wear','Outerwear','Bottoms','Indian Wear'];
    const colors = ['White','Red','Navy','Blue','Green'];
    const items  = houseNames.map((_, i) => ({
      id: `ob-${Date.now()}-${i}`,
      name: names[i % names.length],
      category: cats[i % cats.length],
      subType: types[i % types.length],
      color: colors[i % colors.length],
      house: i,
      photo: makeClothSvg(types[i % types.length], colors[i % colors.length]),
      addedAt: new Date().toISOString(),
    }));
    setClothes(items);
  };

  const handleSignOut = async () => {
    await supabase.auth.signOut();
    setSession(null);
    setShowSettings(false);
    setClothes([]); setHouses(DEFAULT_HOUSES); setCategories(DEFAULT_CATEGORIES);
    setProfile({ name:'' }); setFavorites({});
    localStorage.removeItem('potli-onboarded');
    setShowOnboarding(true);
  };

  const seedData = () => {
    const items = SEEDS.map((d, i) => {
      const id = `s-${Date.now()}-${i}`;
      const photo = makeClothSvg(d.subType, d.color);
      savePhoto(id, photo); // store photo locally
      return { id, ...d, photo, addedAt: new Date().toISOString() };
    });
    saveClothes(items);
  };

  // Double-tap to clear home filter
  const handleHomeCardClick = (idx) => {
    const now = Date.now();
    const last = lastTap.current[idx] || 0;
    if (now - last < 380) {
      setActiveHouse(null);
      lastTap.current[idx] = 0;
    } else {
      lastTap.current[idx] = now;
      setActiveHouse(activeHouse === idx ? null : idx);
    }
  };

  // Photo + AI
  const fileToBase64 = (file) => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res({ base64: r.result.split(',')[1], mediaType: r.result.split(';')[0].split(':')[1], dataUrl: r.result });
    r.onerror = rej;
    r.readAsDataURL(file);
  });

  const handlePhotoUpload = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    setAnalyzing(true); setAnalyzeError('');
    try {
      const { base64, mediaType, dataUrl } = await fileToBase64(file);
      setForm(p => ({ ...p, photo: dataUrl }));
      const catList = Object.keys(categories);
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 800,
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
            { type: 'text', text: `Identify clothing item. Return ONLY JSON:\n{"name":"Title Case max 4 words","category":"one of: ${catList.join(', ')}","subType":"from ${JSON.stringify(categories)}","color":"primary color"}` }
          ]}],
        }),
      });
      const data = await resp.json();
      const raw = data.content.map(c => c.type === 'text' ? c.text : '').join('').replace(/```json|```/g, '').trim();
      const p = JSON.parse(raw);
      const vc = catList.includes(p.category) ? p.category : 'Other';
      const vt = (categories[vc] || []).includes(p.subType) ? p.subType : '';
      setForm(prev => ({ ...prev, name: p.name || prev.name, category: vc, subType: vt, color: p.color || prev.color }));
    } catch { setAnalyzeError('Could not auto-fill — please fill manually.'); }
    finally { setAnalyzing(false); }
  };

  const openAdd = () => {
    setForm({ name: '', category: '', subType: '', color: '', house: activeHouse ?? 0, photo: '' });
    setEditingItem(null); setAnalyzeError(''); setAddStep(0);
    setShowAddModal(true);
  };

  const openEdit = (item) => {
    setForm({ name: item.name, category: item.category, subType: item.subType, color: item.color, house: item.house, photo: item.photo });
    setEditingItem(item); setAnalyzeError(''); setAddStep(3);
    setShowAddModal(true);
  };

  const handleSave = () => {
    const autoName = form.name.trim() || form.subType || form.category || 'Item';
    const resolvedForm = { ...form, name: autoName };
    const photo = resolvedForm.photo || (resolvedForm.subType ? makeClothSvg(resolvedForm.subType, resolvedForm.color) : '');
    const doSave = () => {
      if (editingItem) {
        savePhoto(editingItem.id, photo);
        saveClothes(clothes.map(c => c.id === editingItem.id ? { ...c, ...resolvedForm, photo } : c));
      } else {
        const id = Date.now().toString();
        savePhoto(id, photo);
        saveClothes([...clothes, { id, ...resolvedForm, photo, addedAt: new Date().toISOString() }]);
      }
      setShowAddModal(false);
    };
    if (!session) {
      setPendingSave(() => doSave);
      setShowSignUpSheet(true);
      return;
    }
    doSave();
  };

  const handleDelete  = (id) => saveClothes(clothes.filter(c => c.id !== id));
  const handleMove    = (id, idx) => { saveClothes(clothes.map(c => c.id === id ? { ...c, house: idx } : c)); setMovingItem(null); };
  const toggleFav     = (id) => { const u = { ...favorites, [id]: !favorites[id] }; saveFavs(u); };

  // Home management
  const addHome    = (name) => saveHouses([...houses, name]);
  const removeHome = (idx) => {
    if (houses.length <= 1) return;
    saveClothes(clothes.map(c => c.house === idx ? { ...c, house: 0 } : c.house > idx ? { ...c, house: c.house - 1 } : c));
    saveHouses(houses.filter((_, i) => i !== idx));
    if (activeHouse === idx) setActiveHouse(null);
  };
  const renameHome = (idx, v) => { const u = [...houses]; u[idx] = v; saveHouses(u); };

  // Category management
  const addCategory    = (name) => { if (!name || categories[name]) return; saveCategories({ ...categories, [name]: [] }); };
  const removeCategory = (name) => {
    const u = { ...categories }; delete u[name];
    saveCategories(u);
    if (filterCat === name) setFilterCat('all');
  };
  const renameCategory = (oldName, newName) => {
    if (!newName || newName === oldName) return;
    const u = {};
    Object.keys(categories).forEach(k => { u[k === oldName ? newName : k] = categories[k]; });
    saveCategories(u);
    setActiveCatEdit(newName);
  };
  const addType    = (cat, type) => { if (!type || (categories[cat] || []).includes(type)) return; saveCategories({ ...categories, [cat]: [...(categories[cat] || []), type] }); };
  const removeType = (cat, type) => { saveCategories({ ...categories, [cat]: (categories[cat] || []).filter(t => t !== type) }); };

  const filtered = clothes.filter(c => {
    if (activeHouse !== null && c.house !== activeHouse) return false;
    if (filterCat !== 'all' && c.category !== filterCat) return false;
    if (searchTerm) {
      const t = searchTerm.toLowerCase();
      return c.name.toLowerCase().includes(t) || c.subType.toLowerCase().includes(t) || c.color.toLowerCase().includes(t);
    }
    return true;
  });

  const hCounts   = houses.map((_, i) => clothes.filter(c => c.house === i).length);
  const catCounts = Object.keys(categories).reduce((a, k) => ({ ...a, [k]: clothes.filter(c => (activeHouse === null || c.house === activeHouse) && c.category === k).length }), {});
  const mainTabs  = ['all', ...Object.keys(categories).slice(0, 4)];
  const initials = profile.name
    ? profile.name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2)
    : 'ME';

  if (!sessionChecked) return null;
  if (showOnboarding) return <OnboardingFlow onComplete={handleOnboardingComplete} />;
  if (!session && !showSignUpSheet && !loading) return <AuthScreen onAuth={handleAuth} />;

  if (loading) return (
    <div style={{ minHeight:'100vh', background:CREAM, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <span style={{ color:'#a8a29e', fontSize:14 }}>Loading wardrobe…</span>
    </div>
  );

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600&display=swap');
        *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
        body{margin:0;background:#FAF7F2;font-family:'Inter',system-ui,sans-serif;}
        .serif{font-family:'Fraunces',Georgia,serif;}
        .fade-up{animation:fu .3s ease both;}
        @keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
        .hs::-webkit-scrollbar{display:none;}.hs{scrollbar-width:none;}
        select,input,button,textarea{font-family:'Inter',system-ui,sans-serif;}
      `}</style>

      <div style={{ minHeight:'100vh', background:CREAM, paddingBottom:110, color:'#2c2a26' }}>

        {/* ── HEADER ── */}
        <div style={{ background:CREAM, position:'sticky', top:0, zIndex:20, borderBottom:'1px solid rgba(44,42,38,0.06)' }}>
          <div style={{ maxWidth:560, margin:'0 auto', padding:'18px 20px 0' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
              <button style={{ ...btnReset, padding:4 }}><Menu size={20} color="#2c2a26" strokeWidth={1.6}/></button>
              <button onClick={() => { setShowSettings(true); setSettingsPage('main'); }}
                style={{ ...btnReset, width:34, height:34, borderRadius:'50%', background:'#1a1816', flexShrink:0 }}>
                <span style={{ fontSize:11, fontWeight:600, color:'#f5f3ef', fontFamily:"'Fraunces',Georgia,serif", letterSpacing:'0.03em' }}>{initials}</span>
              </button>
            </div>
            <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', paddingBottom:14 }}>
              <div>

                <p style={{ fontSize:11, color:'#a8a29e', margin:'5px 0 0', fontWeight:500 }}>
                  {clothes.length} items · {houses.length} homes
                  {activeHouse !== null && <span style={{ color:GOLD }}> · {houses[activeHouse]}</span>}
