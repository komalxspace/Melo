// ─── AUTH SCREEN (Supabase) ───────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [mode, setMode]         = useState('signin');
  const [name, setName]         = useState('');
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [showPass, setShowPass] = useState(false);
  const [error, setError]       = useState('');
  const [submitting, setSubmitting] = useState(false);

  const inp = {
    width:'100%', padding:'13px 14px', background:'#fff',
    border:'1px solid rgba(44,42,38,0.12)', borderRadius:12,
    fontSize:14, color:'#1a1816', outline:'none', boxSizing:'border-box',
  };
  const lbl = { fontSize:10, letterSpacing:'0.1em', fontWeight:600, textTransform:'uppercase', color:'#a8a29e', display:'block', marginBottom:6 };

  const handleSubmit = async () => {
    setError('');
    if (!email.trim() || !password.trim()) { setError('Please fill in all fields.'); return; }
    if (mode === 'signup' && !name.trim()) { setError('Please enter your name.'); return; }
    if (password.length < 6) { setError('Password must be at least 6 characters.'); return; }
    setSubmitting(true);
    try {
      if (mode === 'signup') {
        const { data, error: err } = await supabase.auth.signUp({
          email: email.trim().toLowerCase(),
          password,
          options: { data: { name: name.trim() } }
        });
        if (err) { setError(err.message); setSubmitting(false); return; }
        if (data.user) onAuth({ id: data.user.id, email: data.user.email, name: name.trim() });
      } else {
        const { data, error: err } = await supabase.auth.signInWithPassword({
          email: email.trim().toLowerCase(), password
        });
        if (err) { setError(err.message); setSubmitting(false); return; }
        const meta = data.user?.user_metadata;
        onAuth({ id: data.user.id, email: data.user.email, name: meta?.name || '' });
      }
    } catch(e) { setError('Something went wrong. Please try again.'); }
    setSubmitting(false);
  };

  return (
    <div style={{ minHeight:'100vh', background:'#FAF7F2', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'24px 24px 56px' }}>
      <div className="auth-up" style={{ textAlign:'center', marginBottom:36, animationDelay:'.05s' }}>
        <div style={{ width:58, height:58, borderRadius:18, background:'#1a1816', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 14px', boxShadow:'0 4px 18px rgba(26,24,22,0.18)' }}>
          <span style={{ fontSize:28, lineHeight:1 }}>👜</span>
        </div>
        <h1 className="serif" style={{ fontSize:30, fontWeight:600, color:'#1a1816', margin:0, letterSpacing:'-0.3px' }}>Potli</h1>
        <p style={{ fontSize:13, color:'#a8a29e', marginTop:7 }}>
          {mode === 'signin' ? 'Welcome back' : 'Track your clothes across every home'}
        </p>
      </div>

      <div className="auth-up" style={{ width:'100%', maxWidth:380, background:'#fff', borderRadius:24, padding:'26px 22px 22px', boxShadow:'0 2px 24px rgba(44,42,38,0.09)', animationDelay:'.12s' }}>
        <div style={{ display:'flex', background:'#f5f3ef', borderRadius:12, padding:3, marginBottom:22, gap:3 }}>
          {[['signin','Sign In'],['signup','Create Account']].map(([m, label]) => (
            <button key={m} onClick={() => { setMode(m); setError(''); }}
              style={{ flex:1, padding:'9px 6px', borderRadius:10, border:'none', cursor:'pointer', fontSize:12, fontWeight:500, transition:'all .18s',
                background: mode===m ? '#fff' : 'transparent', color: mode===m ? '#1a1816' : '#a8a29e',
                boxShadow: mode===m ? '0 1px 4px rgba(44,42,38,0.1)' : 'none' }}>
              {label}
            </button>
          ))}
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {mode === 'signup' && (
            <div>
              <span style={lbl}>Full Name</span>
              <input value={name} onChange={e => setName(e.target.value)} placeholder="Priya Sharma" style={inp} onKeyDown={e => e.key==='Enter' && handleSubmit()}/>
            </div>
          )}
          <div>
            <span style={lbl}>Email</span>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@email.com" style={inp} onKeyDown={e => e.key==='Enter' && handleSubmit()}/>
          </div>
          <div>
            <span style={lbl}>Password</span>
            <div style={{ position:'relative' }}>
              <input type={showPass ? 'text' : 'password'} value={password} onChange={e => setPassword(e.target.value)}
                placeholder={mode==='signup' ? 'Min. 6 characters' : '••••••••'} style={{ ...inp, paddingRight:44 }}
                onKeyDown={e => e.key==='Enter' && handleSubmit()}/>
              <button onClick={() => setShowPass(p => !p)}
                style={{ position:'absolute', right:13, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', padding:0, display:'flex', alignItems:'center', color:'#a8a29e' }}>
                {showPass ? <EyeOff size={15} strokeWidth={1.8}/> : <Eye size={15} strokeWidth={1.8}/>}
              </button>
            </div>
          </div>

          {error && (
            <div style={{ background:'#fef2f2', border:'1px solid #fecaca', borderRadius:10, padding:'9px 12px', fontSize:12, color:'#c0392b', fontWeight:500 }}>
              {error}
            </div>
          )}

          <button onClick={handleSubmit} disabled={submitting}
            style={{ width:'100%', padding:'14px', borderRadius:12, border:'none', cursor: submitting ? 'not-allowed' : 'pointer',
              fontSize:14, fontWeight:600, letterSpacing:'0.02em', marginTop:2,
              background: submitting ? '#d6cfc6' : '#1a1816', color:'#f5f3ef' }}>
            {submitting ? '…' : mode==='signin' ? 'Sign In' : 'Create Account'}
          </button>
        </div>
      </div>

      <p className="auth-up" style={{ fontSize:11, color:'#c4b8a8', marginTop:18, textAlign:'center', lineHeight:1.6, animationDelay:'.2s' }}>
        Your photos stay on this device.<br/>Account data syncs securely to the cloud.
      </p>
    </div>
  );
}

function HomeRow({ index, value, count, canDelete, onSave, onDelete }) {
  const [v, setV] = useState(value);
  useEffect(() => setV(value), [value]);
  return (
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',background:CARD,borderRadius:12,border:'1px solid rgba(44,42,38,0.07)'}}>
      <input value={v} onChange={e => setV(e.target.value)} onBlur={() => v.trim() && onSave(v.trim())}
        onKeyDown={e => { if (e.key === 'Enter' && v.trim()) onSave(v.trim()); }}
        style={{flex:1,border:'none',outline:'none',fontSize:13,color:'#1a1816',background:'transparent',fontFamily:"'Inter',system-ui"}}/>
      <span style={{fontSize:10,color:'#a8a29e',fontWeight:500,whiteSpace:'nowrap'}}>{count} items</span>
      {canDelete && (
        <button onClick={onDelete} style={{...btnReset,padding:2}}>
          <Trash2 size={13} color="#dac8b8" strokeWidth={1.8}/>
        </button>
      )}
    </div>
  );
}

function WardrobeTracker() {
  const [session, setSession]           = useState(null);
  const [sessionChecked, setSessionChecked] = useState(false);
  const [syncError, setSyncError]       = useState('');
  const [clothes, setClothes]           = useState([]);
  const [houses, setHouses]             = useState(DEFAULT_HOUSES);
  const [categories, setCategories]     = useState(DEFAULT_CATEGORIES);
  const [profile, setProfile]           = useState({ name:'' });
  const [favorites, setFavorites]       = useState({});
  const [loading, setLoading]           = useState(true);

  const [activeHouse, setActiveHouse] = useState(null);
  const [filterCat, setFilterCat]     = useState('all');
  const [searchTerm, setSearchTerm]   = useState('');
  const [viewMode, setViewMode]       = useState('grid');
  const lastTap = useRef({});

  const [showAddModal, setShowAddModal]     = useState(false);
  const [editingItem, setEditingItem]       = useState(null);
  const [movingItem, setMovingItem]         = useState(null);
  const [showSettings, setShowSettings]     = useState(false);
  const [settingsPage, setSettingsPage]     = useState('main');
  const [activeCatEdit, setActiveCatEdit]   = useState(null);

  const [form, setForm]             = useState({ name:'', category:'Tops', subType:'', color:'', house:0, photo:'' });
  const [analyzing, setAnalyzing]   = useState(false);
  const [analyzeError, setAnalyzeError] = useState('');
  const [addStep, setAddStep]         = useState(0); // 0=type, 1=details, 2=home, 3=summary
  const fileInputRef = useRef(null);

  // ── Supabase auth — single source of truth ────────────────────────────────
  useEffect(() => {
    // onAuthStateChange fires immediately with current session (or null)
    // This replaces the need for a separate getSession() call
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, s) => {
      if (s) {
        const user = { id: s.user.id, email: s.user.email, name: s.user.user_metadata?.name || '' };
        setSession(user);
      } else {
        setSession(null);
        setClothes([]); setHouses(DEFAULT_HOUSES);
        setCategories(DEFAULT_CATEGORIES); setProfile({ name:'' }); setFavorites({});
        setLoading(false);
      }
      setSessionChecked(true);
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (session) { setLoading(true); loadAll(); }
  }, [session?.id]); // only re-run when user actually changes

  // ── Photo helpers — stored locally by user+id ──────────────────────────────
  const photoKey  = (id) => `potli-photo-${session?.id}-${id}`;
  const getPhoto  = (id) => { try { return localStorage.getItem(photoKey(id)) || ''; } catch(e) { return ''; } };
  const savePhoto = (id, data) => { try { if (data) localStorage.setItem(photoKey(id), data); } catch(e) {} };
  const dropPhoto = (id) => { try { localStorage.removeItem(photoKey(id)); } catch(e) {} };

  // ── Load all cloud data ────────────────────────────────────────────────────
  const loadAll = async () => {
    try {
      const uid = session.id;

      // ── Houses ──────────────────────────────────────────────────────────────
      const { data: hRows, error: hErr } = await supabase
        .from('houses').select('*').eq('user_id', uid).order('position');
      if (hErr) console.warn('houses load:', hErr.message);
      if (hRows && hRows.length > 0) {
        setHouses(hRows.map(r => r.name));
      } else {
        await initDefaultHouses(uid);
      }

      // ── Clothes (schema-safe: works with house_position OR house_id columns) ─
      const { data: cRows, error: cErr } = await supabase
        .from('clothes').select('*').eq('user_id', uid).order('added_at');
      if (cErr) console.warn('clothes load:', cErr.message);
      if (cRows) {
        const items = cRows.map(r => ({
          id: r.id,
          name: r.name,
          category: r.category || '',
          subType: r.sub_type || '',
          color: r.color || '',
          // Support both old schema (house_id) and new (house_position)
          house: typeof r.house_position === 'number' ? r.house_position : 0,
          photo: getPhoto(r.id) || (r.sub_type ? makeClothSvg(r.sub_type, r.color) : ''),
          addedAt: r.added_at,
        }));
        setClothes(items);
      }

      // ── Categories ──────────────────────────────────────────────────────────
      const { data: catRows, error: catErr } = await supabase
        .from('categories').select('*').eq('user_id', uid);
      if (catErr) console.warn('categories load:', catErr.message);
      if (catRows && catRows.length > 0) {
        const catObj = {};
        catRows.forEach(r => { catObj[r.name] = r.types || []; });
        setCategories(catObj);
      } else {
        await initDefaultCategories(uid);
      }

      // ── Profile ─────────────────────────────────────────────────────────────
      const { data: prof } = await supabase
        .from('profiles').select('*').eq('id', uid).maybeSingle();
      if (prof) {
        setProfile({ name: prof.name || session.name || '' });
      } else {
        // First login on new device — create profile row
        await supabase.from('profiles')
          .insert({ id: uid, name: session.name || '' })
          .select().maybeSingle();
        setProfile({ name: session.name || '' });
      }

      // ── Favorites (device-local, lightweight) ────────────────────────────────
      try {
        const fv = localStorage.getItem(`potli-favs-${uid}`);
        if (fv) setFavorites(JSON.parse(fv));
      } catch(e) {}

    } catch(err) {
      console.error('loadAll error:', err);
      setSyncError('Could not load your data. Check internet connection.');
    }
    setLoading(false);
  };

  const initDefaultHouses = async (uid) => {
    const rows = DEFAULT_HOUSES.map((name, i) => ({ user_id: uid, name, position: i }));
    await supabase.from('houses').insert(rows);
    setHouses(DEFAULT_HOUSES);
  };

  const initDefaultCategories = async (uid) => {
    const rows = Object.entries(DEFAULT_CATEGORIES).map(([name, types]) => ({ user_id: uid, name, types }));
    await supabase.from('categories').insert(rows);
    setCategories(DEFAULT_CATEGORIES);
  };

  // ── Save helpers ───────────────────────────────────────────────────────────
  const saveClothes = async (items) => {
    setClothes(items);
    const uid = session?.id; if (!uid) return;

    if (items.length === 0) {
      // Delete everything for this user
      await supabase.from('clothes').delete().eq('user_id', uid);
      return;
    }

    // Upsert all current items (insert or update)
    const rows = items.map(item => ({
      id: item.id,
      user_id: uid,
      name: item.name,
      category: item.category || '',
      sub_type: item.subType || '',
      color: item.color || '',
      house_position: typeof item.house === 'number' ? item.house : 0,
      added_at: item.addedAt || new Date().toISOString(),
    }));
    const { error: upsertErr } = await supabase
      .from('clothes').upsert(rows, { onConflict: 'id' });
    if (upsertErr) { console.error('saveClothes upsert:', upsertErr.message); return; }

    // Delete any rows in DB that are no longer in the list
    const currentIds = items.map(i => i.id);
    const { data: dbRows } = await supabase
      .from('clothes').select('id').eq('user_id', uid);
    if (dbRows) {
      const toDelete = dbRows.map(r => r.id).filter(id => !currentIds.includes(id));
      if (toDelete.length) {
        await supabase.from('clothes').delete().in('id', toDelete);
        toDelete.forEach(id => dropPhoto(id));
      }
    }
  };

  const saveHouses = async (names) => {
    setHouses(names);
    const uid = session?.id; if (!uid) return;
    await supabase.from('houses').delete().eq('user_id', uid);
    const rows = names.map((name, i) => ({ user_id: uid, name, position: i }));
    await supabase.from('houses').insert(rows);
  };

  const saveCategories = async (catObj) => {
    setCategories(catObj);
    const uid = session?.id; if (!uid) return;
    await supabase.from('categories').delete().eq('user_id', uid);
    const rows = Object.entries(catObj).map(([name, types]) => ({ user_id: uid, name, types }));
    if (rows.length) await supabase.from('categories').insert(rows);
  };

  const saveProfile = async (p) => {
    setProfile(p);
    const uid = session?.id; if (!uid) return;
    await supabase.from('profiles')
      .upsert({ id: uid, name: p.name, updated_at: new Date().toISOString() },
               { onConflict: 'id' });
  };

  const saveFavs = (fv) => {
    setFavorites(fv);
    try { localStorage.setItem(`potli-favs-${session?.id}`, JSON.stringify(fv)); } catch(e) {}
  };

  // ── Auth ───────────────────────────────────────────────────────────────────
  const handleAuth = (user) => {
    setSession(user);
  };

  const handleSignOut = async () => {
    await supabase.auth.signOut();
    setSession(null);
    setShowSettings(false);
    setClothes([]); setHouses(DEFAULT_HOUSES); setCategories(DEFAULT_CATEGORIES);
    setProfile({ name:'' }); setFavorites({});
  };

  const seedData = () => {
    const items = SEEDS.map((d, i) => {
      const id = `s-${Date.now()}-${i}`;
      const photo = makeClothSvg(d.subType, d.color);
      savePhoto(id, photo); // store photo locally
      return { id, ...d, photo, addedAt: new Date().toISOString() };
    });
    saveClothes(items);
  };

  // Double-tap to clear home filter
  const handleHomeCardClick = (idx) => {
    const now = Date.now();
    const last = lastTap.current[idx] || 0;
    if (now - last < 380) {
      setActiveHouse(null);
      lastTap.current[idx] = 0;
    } else {
      lastTap.current[idx] = now;
      setActiveHouse(activeHouse === idx ? null : idx);
    }
  };

  // Photo + AI
  const fileToBase64 = (file) => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res({ base64: r.result.split(',')[1], mediaType: r.result.split(';')[0].split(':')[1], dataUrl: r.result });
    r.onerror = rej;
    r.readAsDataURL(file);
  });

  const handlePhotoUpload = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    setAnalyzing(true); setAnalyzeError('');
    try {
      const { base64, mediaType, dataUrl } = await fileToBase64(file);
      setForm(p => ({ ...p, photo: dataUrl }));
      const catList = Object.keys(categories);
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 800,
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
            { type: 'text', text: `Identify clothing item. Return ONLY JSON:\n{"name":"Title Case max 4 words","category":"one of: ${catList.join(', ')}","subType":"from ${JSON.stringify(categories)}","color":"primary color"}` }
          ]}],
        }),
      });
      const data = await resp.json();
      const raw = data.content.map(c => c.type === 'text' ? c.text : '').join('').replace(/```json|```/g, '').trim();
      const p = JSON.parse(raw);
      const vc = catList.includes(p.category) ? p.category : 'Other';
      const vt = (categories[vc] || []).includes(p.subType) ? p.subType : '';
      setForm(prev => ({ ...prev, name: p.name || prev.name, category: vc, subType: vt, color: p.color || prev.color }));
    } catch { setAnalyzeError('Could not auto-fill — please fill manually.'); }
    finally { setAnalyzing(false); }
  };

  const openAdd = () => {
    setForm({ name: '', category: '', subType: '', color: '', house: activeHouse ?? 0, photo: '' });
    setEditingItem(null); setAnalyzeError(''); setAddStep(0);
    setShowAddModal(true);
  };

  const openEdit = (item) => {
    setForm({ name: item.name, category: item.category, subType: item.subType, color: item.color, house: item.house, photo: item.photo });
    setEditingItem(item); setAnalyzeError(''); setAddStep(3);
    setShowAddModal(true);
  };

  const handleSave = () => {
    if (!form.name.trim()) return;
    const photo = form.photo || (form.subType ? makeClothSvg(form.subType, form.color) : '');
    if (editingItem) {
      savePhoto(editingItem.id, photo); // persist photo locally
      saveClothes(clothes.map(c => c.id === editingItem.id ? { ...c, ...form, photo } : c));
    } else {
      const id = Date.now().toString();
      savePhoto(id, photo); // persist photo locally
      saveClothes([...clothes, { id, ...form, photo, addedAt: new Date().toISOString() }]);
    }
    setShowAddModal(false);
  };

  const handleDelete  = (id) => saveClothes(clothes.filter(c => c.id !== id));
  const handleMove    = (id, idx) => { saveClothes(clothes.map(c => c.id === id ? { ...c, house: idx } : c)); setMovingItem(null); };
  const toggleFav     = (id) => { const u = { ...favorites, [id]: !favorites[id] }; saveFavs(u); };

  // Home management
  const addHome    = (name) => saveHouses([...houses, name]);
  const removeHome = (idx) => {
    if (houses.length <= 1) return;
    saveClothes(clothes.map(c => c.house === idx ? { ...c, house: 0 } : c.house > idx ? { ...c, house: c.house - 1 } : c));
    saveHouses(houses.filter((_, i) => i !== idx));
    if (activeHouse === idx) setActiveHouse(null);
  };
  const renameHome = (idx, v) => { const u = [...houses]; u[idx] = v; saveHouses(u); };

  // Category management
  const addCategory    = (name) => { if (!name || categories[name]) return; saveCategories({ ...categories, [name]: [] }); };
  const removeCategory = (name) => {
    const u = { ...categories }; delete u[name];
    saveCategories(u);
    if (filterCat === name) setFilterCat('all');
  };
  const renameCategory = (oldName, newName) => {
    if (!newName || newName === oldName) return;
    const u = {};
    Object.keys(categories).forEach(k => { u[k === oldName ? newName : k] = categories[k]; });
    saveCategories(u);
    setActiveCatEdit(newName);
  };
  const addType    = (cat, type) => { if (!type || (categories[cat] || []).includes(type)) return; saveCategories({ ...categories, [cat]: [...(categories[cat] || []), type] }); };
  const removeType = (cat, type) => { saveCategories({ ...categories, [cat]: (categories[cat] || []).filter(t => t !== type) }); };

  const filtered = clothes.filter(c => {
    if (activeHouse !== null && c.house !== activeHouse) return false;
    if (filterCat !== 'all' && c.category !== filterCat) return false;
    if (searchTerm) {
      const t = searchTerm.toLowerCase();
      return c.name.toLowerCase().includes(t) || c.subType.toLowerCase().includes(t) || c.color.toLowerCase().includes(t);
    }
    return true;
  });

  const hCounts   = houses.map((_, i) => clothes.filter(c => c.house === i).length);
  const catCounts = Object.keys(categories).reduce((a, k) => ({ ...a, [k]: clothes.filter(c => (activeHouse === null || c.house === activeHouse) && c.category === k).length }), {});
  const mainTabs  = ['all', ...Object.keys(categories).slice(0, 4)];
  const initials = profile.name
    ? profile.name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2)
    : 'ME';

  if (!sessionChecked) return null; // tiny flash before check completes
  if (!session) return <AuthScreen onAuth={handleAuth} />;

  if (loading) return (
    <div style={{ minHeight:'100vh', background:CREAM, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <span style={{ color:'#a8a29e', fontSize:14 }}>Loading wardrobe…</span>
    </div>
  );

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600&display=swap');
        *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
        body{margin:0;background:#FAF7F2;font-family:'Inter',system-ui,sans-serif;}
        .serif{font-family:'Fraunces',Georgia,serif;}
        .fade-up{animation:fu .3s ease both;}
        @keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
        .hs::-webkit-scrollbar{display:none;}.hs{scrollbar-width:none;}
        select,input,button,textarea{font-family:'Inter',system-ui,sans-serif;}
      `}</style>

      <div style={{ minHeight:'100vh', background:CREAM, paddingBottom:110, color:'#2c2a26' }}>

        {/* ── HEADER ── */}
        <div style={{ background:CREAM, position:'sticky', top:0, zIndex:20, borderBottom:'1px solid rgba(44,42,38,0.06)' }}>
          <div style={{ maxWidth:560, margin:'0 auto', padding:'18px 20px 0' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
              <button style={{ ...btnReset, padding:4 }}><Menu size={20} color="#2c2a26" strokeWidth={1.6}/></button>
              <button onClick={() => { setShowSettings(true); setSettingsPage('main'); }}
                style={{ ...btnReset, width:34, height:34, borderRadius:'50%', background:'#1a1816', flexShrink:0 }}>
                <span style={{ fontSize:11, fontWeight:600, color:'#f5f3ef', fontFamily:"'Fraunces',Georgia,serif", letterSpacing:'0.03em' }}>{initials}</span>
              </button>
            </div>
            <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', paddingBottom:14 }}>
              <div>
                <h1 className="serif" style={{ fontSize:36, fontWeight:600, margin:0, lineHeight:1, letterSpacing:'-0.4px', color:'#1a1816' }}>Wardrobe</h1>
                <p style={{ fontSize:11, color:'#a8a29e', margin:'5px 0 0', fontWeight:500 }}>
                  {clothes.length} items · {houses.length} homes
                  {activeHouse !== null && <span style={{ color:GOLD }}> · {houses[activeHouse]}</span>}
                </p>
              </div>
              <button onClick={openAdd} style={{ ...btnReset, gap:5, fontSize:13, fontWeight:500, color:'#2c2a26', padding:'6px 0', cursor:'pointer' }}>
                <Plus size={16} strokeWidth={2}/> Add New
              </button>
            </div>
          </div>
        </div>

        <div style={{ maxWidth:560, margin:'0 auto', padding:'16px 20px 0' }}>

          {/* ── SEED BANNER ── */}
          {clothes.length === 0 && (
            <div className="fade-up" style={{ background:CARD, borderRadius:18, padding:'15px 18px', marginBottom:16, boxShadow:'0 1px 6px rgba(44,42,38,0.07)' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:12 }}>
                <div>
                  <div className="serif" style={{ fontSize:16, fontWeight:600, color:'#1a1816' }}>Get started</div>
                  <div style={{ fontSize:11, color:'#a8a29e', marginTop:3 }}>Load 10 sample items across all 3 homes.</div>
                </div>
                <button onClick={seedData} style={{ ...btnReset, background:GOLD, color:'#fff', borderRadius:10, padding:'9px 14px', fontSize:12, fontWeight:600, whiteSpace:'nowrap', cursor:'pointer' }}>
                  Load Samples
                </button>
              </div>
            </div>
          )}

          {/* ── HOME CARDS — horizontal scroll so they never wrap ── */}
          <div style={{ display:'flex', gap:8, overflowX:'auto', marginBottom:14, paddingBottom:2 }} className="hs">
            {houses.map((h, i) => {
              const active = activeHouse === i;
              const emojis = ['🏠','🌸','💜','🏡','✨','🌿'];
              return (
                <button key={i} onClick={() => handleHomeCardClick(i)} style={{
                  ...btnReset, flexShrink:0, minWidth:110, textAlign:'left',
                  padding:'12px 14px 11px', borderRadius:16, cursor:'pointer',
                  background: active ? '#1a1816' : CARD,
                  boxShadow: active ? '0 2px 10px rgba(26,24,22,0.18)' : '0 1px 4px rgba(44,42,38,0.07)',
                  transition:'all .2s', display:'flex', flexDirection:'column', alignItems:'flex-start',
                }}>
                  <div style={{ fontSize:9, letterSpacing:'0.1em', fontWeight:600, textTransform:'uppercase', color: active ? '#6b6560' : '#c4b8a8', marginBottom:5 }}>
                    {emojis[i % emojis.length]} Home {i + 1}
                  </div>
                  <div style={{ fontSize:11, fontWeight:500, color: active ? '#f5f3ef' : '#5c5652', marginBottom:9, maxWidth:88, overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>{h}</div>
                  <div style={{ display:'flex', alignItems:'baseline', gap:2 }}>
                    <span className="serif" style={{ fontSize:26, fontWeight:600, lineHeight:1, color: active ? '#f5f3ef' : '#1a1816' }}>{hCounts[i]}</span>
                    <span style={{ fontSize:9, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em', color: active ? '#6b6560' : '#c4b8a8' }}>items</span>
                  </div>
                  {active && <div style={{ fontSize:8, color:'#6b6560', marginTop:5, letterSpacing:'0.04em' }}>double-tap to clear</div>}
                </button>
              );
            })}
          </div>

          {/* ── TAB BAR ── */}
          <div style={{ display:'flex', borderBottom:'1.5px solid rgba(44,42,38,0.08)', marginBottom:12, overflowX:'auto' }} className="hs">
            {mainTabs.map(tab => {
              const active = filterCat === tab || (tab === 'all' && filterCat === 'all');
              return (
                <button key={tab} onClick={() => setFilterCat(tab)} style={{
                  ...btnReset, paddingBottom:11, paddingTop:2, paddingRight:14, paddingLeft:2,
                  fontSize:13, fontWeight: active ? 600 : 400, color: active ? '#1a1816' : '#a8a29e',
                  position:'relative', whiteSpace:'nowrap', cursor:'pointer', transition:'color .15s',
                }}>
                  {tab === 'all' ? 'All' : tab}
                  {active && <div style={{ position:'absolute', bottom:0, left:2, right:14, height:2, background:GOLD, borderRadius:2 }}/>}
                </button>
              );
            })}
          </div>

          {/* ── EXTRA CATEGORY PILLS ── */}
          {Object.keys(catCounts).some(k => catCounts[k] > 0 && !mainTabs.includes(k)) && (
            <div style={{ display:'flex', gap:6, overflowX:'auto', marginBottom:12, paddingBottom:2 }} className="hs">
              {Object.keys(categories).map(cat => {
                if (!catCounts[cat] || mainTabs.includes(cat)) return null;
                const active = filterCat === cat;
                return (
                  <button key={cat} onClick={() => setFilterCat(cat)} style={{
                    ...btnReset, padding:'5px 12px', borderRadius:20, fontSize:11, fontWeight:500,
                    whiteSpace:'nowrap', cursor:'pointer',
                    background: active ? '#1a1816' : CARD, color: active ? '#f5f3ef' : '#5c5652',
                    border:`1px solid ${active ? '#1a1816' : 'rgba(44,42,38,0.12)'}`, transition:'all .15s',
                  }}>
                    {cat} <span style={{ opacity:.5 }}>{catCounts[cat]}</span>
                  </button>
                );
              })}
            </div>
          )}

          {/* ── SEARCH + VIEW TOGGLE ── */}
          <div style={{ display:'flex', gap:8, marginBottom:16, alignItems:'center' }}>
            <div style={{ position:'relative', flex:1 }}>
              <Search size={13} color="#a8a29e" strokeWidth={1.8} style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)' }}/>
              <input type="text" placeholder="Search wardrobe" value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                style={{ width:'100%', paddingLeft:34, paddingRight:10, paddingTop:9, paddingBottom:9, background:CARD, border:'1px solid rgba(44,42,38,0.1)', borderRadius:11, fontSize:13, color:'#2c2a26', outline:'none', boxSizing:'border-box' }}/>
            </div>
            <div style={{ display:'flex', background:CARD, border:'1px solid rgba(44,42,38,0.1)', borderRadius:11, padding:3, gap:1 }}>
              <button onClick={() => setViewMode('grid')} style={{ ...btnReset, background: viewMode==='grid' ? GOLD : 'none', borderRadius:8, padding:'6px 8px', cursor:'pointer', transition:'background .15s' }}>
                <LayoutGrid size={13} color={viewMode==='grid' ? '#fff' : '#a8a29e'} strokeWidth={1.8}/>
              </button>
              <button onClick={() => setViewMode('list')} style={{ ...btnReset, background: viewMode==='list' ? GOLD : 'none', borderRadius:8, padding:'6px 8px', cursor:'pointer', transition:'background .15s' }}>
                <List size={13} color={viewMode==='list' ? '#fff' : '#a8a29e'} strokeWidth={1.8}/>
              </button>
            </div>
          </div>

          {/* ── SECTION HEADER ── */}
          {filtered.length > 0 && (
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:12 }}>
              <h2 className="serif" style={{ fontSize:20, fontWeight:600, margin:0, color:'#1a1816' }}>
                {activeHouse !== null ? houses[activeHouse] : filterCat === 'all' ? 'All Items' : filterCat}
              </h2>
              <span style={{ fontSize:11, color:'#a8a29e', fontWeight:500 }}>{filtered.length} items</span>
            </div>
          )}

          {/* ── EMPTY ── */}
          {filtered.length === 0 ? (
            <div style={{ background:CARD, borderRadius:18, padding:'40px 24px', textAlign:'center', boxShadow:'0 1px 4px rgba(44,42,38,0.06)' }}>
              <div style={{ width:40, height:40, background:'#f5f3ef', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 10px' }}>
                <Tag size={16} color="#d4c8bc" strokeWidth={1.5}/>
              </div>
              <div className="serif" style={{ fontSize:15, color:'#5c5652', fontWeight:500 }}>
                {clothes.length === 0 ? 'Your wardrobe is empty' : 'No items found'}
              </div>
              <div style={{ fontSize:11, color:'#a8a29e', marginTop:3 }}>
                {clothes.length === 0 ? 'Tap "Add New" to begin' : 'Try a different filter'}
              </div>
            </div>

          /* ── GRID ── */
          ) : viewMode === 'grid' ? (
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }} className="fade-up">
              {filtered.map(item => (
                <div key={item.id} style={{ background:CARD, borderRadius:18, overflow:'hidden', boxShadow:'0 1px 5px rgba(44,42,38,0.07)' }}>
                  <div style={{ position:'relative', aspectRatio:'3/4', background:'#F5F3EF' }}>
                    <img src={item.photo} alt={item.name} style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }}/>
                    <button onClick={() => toggleFav(item.id)} style={{ ...btnReset, position:'absolute', top:9, left:9, width:28, height:28, background:'rgba(255,255,255,0.85)', backdropFilter:'blur(4px)', borderRadius:'50%', cursor:'pointer' }}>
                      <Heart size={12} strokeWidth={1.8} fill={favorites[item.id] ? '#E04A6B' : 'none'} color={favorites[item.id] ? '#E04A6B' : '#78716c'}/>
                    </button>
                    <button onClick={() => openEdit(item)} style={{ ...btnReset, position:'absolute', top:9, right:9, width:28, height:28, background:'rgba(255,255,255,0.85)', backdropFilter:'blur(4px)', borderRadius:'50%', cursor:'pointer' }}>
                      <Pencil size={11} color="#78716c" strokeWidth={1.8}/>
                    </button>
                    <div style={{ position:'absolute', bottom:9, left:9, right:9 }}>
                      <div style={{ background:'rgba(255,255,255,0.88)', backdropFilter:'blur(6px)', borderRadius:7, padding:'3px 8px', display:'inline-block' }}>
                        <span style={{ fontSize:9, fontWeight:600, letterSpacing:'0.07em', textTransform:'uppercase', color:'#5c5652' }}>{houses[item.house]}</span>
                      </div>
                    </div>
                  </div>
                  <div style={{ padding:'10px 10px 8px' }}>
                    <div style={{ fontSize:12, fontWeight:500, color:'#1a1816', overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>{item.name}</div>
                    <div style={{ fontSize:10, color:'#a8a29e', marginTop:1 }}>{item.subType || item.category}{item.color && ` · ${item.color}`}</div>
                    <div style={{ display:'flex', alignItems:'center', marginTop:8, paddingTop:7, borderTop:'1px solid #f5f1ec' }}>
                      <button onClick={() => setMovingItem(item)} style={{ ...btnReset, flex:1, fontSize:10, fontWeight:500, color:'#78716c', padding:'1px 0', cursor:'pointer' }}
                        onMouseEnter={e => e.currentTarget.style.color='#1a1816'} onMouseLeave={e => e.currentTarget.style.color='#78716c'}>Move</button>
                      <div style={{ width:1, height:10, background:'#f0ece8' }}/>
                      <button onClick={() => handleDelete(item.id)} style={{ ...btnReset, flex:1, fontSize:10, fontWeight:500, color:'#78716c', padding:'1px 0', cursor:'pointer' }}
                        onMouseEnter={e => e.currentTarget.style.color='#c0392b'} onMouseLeave={e => e.currentTarget.style.color='#78716c'}>Remove</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>

          /* ── LIST ── */
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:7 }} className="fade-up">
              {filtered.map(item => (
                <div key={item.id} style={{ background:CARD, borderRadius:14, padding:'10px 12px', display:'flex', alignItems:'center', gap:11, boxShadow:'0 1px 4px rgba(44,42,38,0.06)' }}>
                  <img src={item.photo} alt={item.name} style={{ width:54, height:54, borderRadius:10, objectFit:'cover', background:'#F5F3EF', flexShrink:0 }}/>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:500, color:'#1a1816', overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>{item.name}</div>
                    <div style={{ fontSize:10, color:'#a8a29e', marginTop:1 }}>{item.subType}{item.color && ` · ${item.color}`}</div>
                    <div style={{ fontSize:9, color:GOLD, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', marginTop:4 }}>{houses[item.house]}</div>
                  </div>
                  <button onClick={() => toggleFav(item.id)} style={{ ...btnReset, padding:4, cursor:'pointer' }}>
                    <Heart size={14} strokeWidth={1.8} fill={favorites[item.id] ? '#E04A6B' : 'none'} color={favorites[item.id] ? '#E04A6B' : '#c4b8a8'}/>
                  </button>
                  <button onClick={() => openEdit(item)} style={{ ...btnReset, padding:4, cursor:'pointer' }}>
                    <Pencil size={13} color="#c4b8a8" strokeWidth={1.8}/>
                  </button>
                  <button onClick={() => setMovingItem(item)} style={{ ...btnReset, padding:4, cursor:'pointer' }}>
                    <ArrowRightLeft size={13} color="#c4b8a8" strokeWidth={1.8}/>
                  </button>
                  <button onClick={() => handleDelete(item.id)} style={{ ...btnReset, padding:4, cursor:'pointer' }}>
                    <Trash2 size={13} color="#c4b8a8" strokeWidth={1.8}/>
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ── FAB ── */}
        <button onClick={openAdd} style={{ position:'fixed', bottom:24, right:24, width:50, height:50, borderRadius:'50%', background:'#1a1816', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 4px 18px rgba(26,24,22,0.22)', zIndex:30, transition:'transform .15s' }}
          onMouseEnter={e => e.currentTarget.style.transform='scale(1.07)'}
          onMouseLeave={e => e.currentTarget.style.transform='scale(1)'}>
          <Plus size={20} color="#f5f3ef" strokeWidth={1.8}/>
        </button>

        {/* ══ ADD / EDIT MODAL — full-screen slide flow ══ */}
        {showAddModal && (
          <div style={{ position:'fixed', inset:0, background:'#FAF7F2', zIndex:40, display:'flex', flexDirection:'column', overflowY:'auto' }}>

            {/* ── Top bar ── */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'18px 20px 12px', flexShrink:0 }}>
              <button onClick={() => {
                if (addStep > 0 && !editingItem) setAddStep(s => s - 1);
                else { setShowAddModal(false); }
              }} style={{ ...btnReset, width:36, height:36, borderRadius:'50%', background:CARD, border:'1px solid rgba(44,42,38,0.1)', cursor:'pointer' }}>
                <ChevronLeft size={16} color="#5c5652" strokeWidth={2}/>
              </button>

              {/* Step dots — only for new items */}
              {!editingItem && (
                <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                  {[0,1,2,3].map(s => (
                    <div key={s} style={{ width: addStep===s ? 18 : 6, height:6, borderRadius:3, background: addStep===s ? '#1a1816' : addStep>s ? GOLD : '#e0d8cf', transition:'all .2s' }}/>
                  ))}
                </div>
              )}

              <button onClick={() => setShowAddModal(false)} style={{ ...btnReset, width:36, height:36, borderRadius:'50%', background:CARD, border:'1px solid rgba(44,42,38,0.1)', cursor:'pointer' }}>
                <X size={14} color="#5c5652" strokeWidth={2}/>
              </button>
            </div>

            {/* ── STEP 0 — Type picker ── */}
            {addStep === 0 && (
              <div style={{ flex:1, padding:'8px 20px 32px', display:'flex', flexDirection:'column' }}>
                {/* Optional photo at top */}
                <input ref={fileInputRef} type="file" accept="image/*" onChange={async (e) => {
                  const file = e.target.files?.[0]; if (!file) return;
                  setAnalyzing(true); setAnalyzeError('');
                  try {
                    const { base64, mediaType, dataUrl } = await fileToBase64(file);
                    setForm(p => ({ ...p, photo: dataUrl }));
                    const catList = Object.keys(categories);
                    const resp = await fetch('https://api.anthropic.com/v1/messages', {
                      method:'POST', headers:{'Content-Type':'application/json'},
                      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:600,
                        messages:[{ role:'user', content:[
                          { type:'image', source:{ type:'base64', media_type:mediaType, data:base64 }},
                          { type:'text', text:`Identify clothing item. Return ONLY JSON:\n{"name":"Title Case max 4 words","category":"one of: ${catList.join(', ')}","subType":"from ${JSON.stringify(categories)}","color":"primary color"}` }
                        ]}]
                      })
                    });
                    const data = await resp.json();
                    const raw = data.content.map(c => c.type==='text'?c.text:'').join('').replace(/```json|```/g,'').trim();
                    const p = JSON.parse(raw);
                    const vc = catList.includes(p.category) ? p.category : '';
                    const vt = (categories[vc]||[]).includes(p.subType) ? p.subType : '';
                    setForm(prev => ({ ...prev, name:p.name||prev.name, category:vc, subType:vt, color:p.color||prev.color }));
                  } catch { setAnalyzeError('Could not read photo — fill in manually.'); }
                  finally { setAnalyzing(false); }
                }} style={{ display:'none' }}/>

                {/* Photo strip */}
                <button onClick={() => fileInputRef.current?.click()} style={{ ...btnReset, cursor:'pointer', alignSelf:'center', marginBottom:20, borderRadius:14, overflow:'hidden', background: form.photo ? 'transparent' : CARD, border: form.photo ? 'none' : '1.5px dashed rgba(44,42,38,0.15)', padding: form.photo ? 0 : '10px 18px', flexDirection:'row', gap:7 }}>
                  {form.photo ? (
                    <div style={{ position:'relative' }}>
                      <img src={form.photo} style={{ width:72, height:72, borderRadius:14, objectFit:'cover', display:'block' }}/>
                      <div style={{ position:'absolute', inset:0, borderRadius:14, background:'rgba(0,0,0,0.18)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                        <Camera size={16} color="#fff" strokeWidth={1.8}/>
                      </div>
                    </div>
                  ) : (
                    analyzing ? <><Sparkles size={13} color={GOLD}/><span style={{ fontSize:12, color:'#a8a29e' }}>Scanning…</span></>
                    : <><Camera size={13} color="#a8a29e" strokeWidth={1.8}/><span style={{ fontSize:12, color:'#a8a29e' }}>Add photo</span><span style={{ fontSize:11, color:GOLD, fontWeight:500 }}>· AI fills form</span></>
                  )}
                </button>
                {analyzeError && <p style={{ fontSize:11, color:'#c0392b', textAlign:'center', margin:'-12px 0 12px' }}>{analyzeError}</p>}

                <h2 className="serif" style={{ fontSize:26, fontWeight:600, color:'#1a1816', margin:'0 0 6px', letterSpacing:'-0.3px' }}>What type?</h2>
                <p style={{ fontSize:13, color:'#a8a29e', margin:'0 0 20px' }}>Select category, then sub-type</p>

                {/* Category chips */}
                <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:16 }}>
                  {Object.keys(categories).map(cat => {
                    const sel = form.category === cat;
                    return (
                      <button key={cat} onClick={() => setForm(p => ({ ...p, category:cat, subType:'' }))}
                        style={{ ...btnReset, padding:'9px 16px', borderRadius:24, fontSize:13, fontWeight: sel?600:400, cursor:'pointer', transition:'all .15s', border:'none',
                          background: sel ? '#1a1816' : CARD,
                          color: sel ? '#f5f3ef' : '#5c5652',
                          boxShadow: sel ? '0 2px 8px rgba(26,24,22,0.18)' : '0 1px 3px rgba(44,42,38,0.08)',
                        }}>
                        {cat}
                      </button>
                    );
                  })}
                </div>

                {/* Sub-type chips — slide in once category is selected */}
                {form.category && (categories[form.category]||[]).length > 0 && (
                  <div className="fade-up">
                    <p style={{ fontSize:11, letterSpacing:'0.08em', textTransform:'uppercase', fontWeight:600, color:'#a8a29e', margin:'0 0 10px' }}>{form.category}</p>
                    <div style={{ display:'flex', flexWrap:'wrap', gap:7 }}>
                      {(categories[form.category]||[]).map(type => {
                        const sel = form.subType === type;
                        return (
                          <button key={type} onClick={() => setForm(p => ({ ...p, subType:type }))}
                            style={{ ...btnReset, padding:'8px 14px', borderRadius:20, fontSize:12, fontWeight: sel?600:400, cursor:'pointer', transition:'all .15s', border:'none',
                              background: sel ? GOLD : '#f0ece8',
                              color: sel ? '#fff' : '#5c5652',
                              boxShadow: sel ? `0 2px 8px ${GOLD}44` : 'none',
                            }}>
                            {type}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Next button — enabled once category selected */}
                <div style={{ marginTop:'auto', paddingTop:24 }}>
                  <button onClick={() => setAddStep(1)} disabled={!form.category}
                    style={{ ...btnReset, width:'100%', padding:'15px', borderRadius:14, fontSize:14, fontWeight:600, cursor: form.category?'pointer':'not-allowed',
                      background: form.category ? '#1a1816' : '#e0d8cf', color: form.category ? '#f5f3ef' : '#a8a29e',
                      justifyContent:'center', transition:'all .15s',
                    }}>
                    Continue →
                  </button>
                </div>
              </div>
            )}

            {/* ── STEP 1 — Name + Color ── */}
            {addStep === 1 && (
              <div style={{ flex:1, padding:'8px 20px 32px', display:'flex', flexDirection:'column' }}>
                <div style={{ marginBottom:24 }}>
                  {form.photo && <img src={form.photo} style={{ width:64, height:64, borderRadius:14, objectFit:'cover', marginBottom:16 }}/>}
                  <h2 className="serif" style={{ fontSize:26, fontWeight:600, color:'#1a1816', margin:'0 0 4px', letterSpacing:'-0.3px' }}>Name it</h2>
                  <p style={{ fontSize:13, color:'#a8a29e', margin:0 }}>What should we call this?</p>
                </div>

                {/* Name */}
                <div style={{ marginBottom:16 }}>
                  <span style={{ fontSize:10, letterSpacing:'0.1em', fontWeight:600, textTransform:'uppercase', color:'#a8a29e', display:'block', marginBottom:8 }}>Name</span>
                  <input
                    autoFocus
                    value={form.name}
                    onChange={e => setForm(p => ({ ...p, name:e.target.value }))}
                    placeholder={form.subType ? `e.g. My favourite ${form.subType}` : 'e.g. Blue cotton kurta'}
                    onKeyDown={e => { if (e.key==='Enter' && form.name.trim()) setAddStep(2); }}
                    style={{ width:'100%', padding:'14px 16px', background:CARD, border:'1.5px solid rgba(44,42,38,0.12)', borderRadius:14, fontSize:16, color:'#1a1816', outline:'none', boxSizing:'border-box' }}
                  />
                </div>

                {/* Color swatches + text */}
                <div>
                  <span style={{ fontSize:10, letterSpacing:'0.1em', fontWeight:600, textTransform:'uppercase', color:'#a8a29e', display:'block', marginBottom:8 }}>Color</span>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:10 }}>
                    {['White','Black','Navy','Blue','Red','Pink','Green','Yellow','Grey','Brown','Beige','Maroon','Floral','Mixed'].map(col => {
                      const swatchColors = { White:'#f5f3ef',Black:'#1a1816',Navy:'#1e3a66',Blue:'#5b7ca3',Red:'#b85450',Pink:'#d89aab',Green:'#7a8b6f',Yellow:'#d4a85c',Grey:'#9c9a95',Brown:'#7a5c42',Beige:'#d4c5a0',Maroon:'#7a3838',Floral:'#e0a8b5',Mixed:'#b5a8c0' };
                      const sel = form.color === col;
                      return (
                        <button key={col} onClick={() => setForm(p => ({ ...p, color:col }))}
                          style={{ ...btnReset, width:32, height:32, borderRadius:'50%', cursor:'pointer', flexShrink:0,
                            background: swatchColors[col] || '#ccc',
                            border: sel ? '3px solid #1a1816' : '2px solid rgba(44,42,38,0.12)',
                            boxShadow: sel ? '0 0 0 2px #FAF7F2' : 'none',
                            transition:'all .12s',
                          }} title={col}/>
                      );
                    })}
                  </div>
                  <input value={form.color} onChange={e => setForm(p => ({ ...p, color:e.target.value }))}
                    placeholder="or type any color…"
                    style={{ width:'100%', padding:'10px 14px', background:CARD, border:'1px solid rgba(44,42,38,0.1)', borderRadius:10, fontSize:13, color:'#1a1816', outline:'none', boxSizing:'border-box' }}/>
                </div>

                <div style={{ marginTop:'auto', paddingTop:24 }}>
                  <button onClick={() => setAddStep(2)} disabled={!form.name.trim()}
                    style={{ ...btnReset, width:'100%', padding:'15px', borderRadius:14, fontSize:14, fontWeight:600, cursor: form.name.trim()?'pointer':'not-allowed',
                      background: form.name.trim() ? '#1a1816' : '#e0d8cf', color: form.name.trim() ? '#f5f3ef' : '#a8a29e',
                      justifyContent:'center', transition:'all .15s',
                    }}>
                    Continue →
                  </button>
                </div>
              </div>
            )}

            {/* ── STEP 2 — Home ── */}
            {addStep === 2 && (
              <div style={{ flex:1, padding:'8px 20px 32px', display:'flex', flexDirection:'column' }}>
                <div style={{ marginBottom:28 }}>
                  <h2 className="serif" style={{ fontSize:26, fontWeight:600, color:'#1a1816', margin:'0 0 4px', letterSpacing:'-0.3px' }}>Where is it?</h2>
                  <p style={{ fontSize:13, color:'#a8a29e', margin:0 }}>Which home is this item at right now?</p>
                </div>

                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  {houses.map((h, i) => {
                    const sel = form.house === i;
                    const emojis = ['🏠','🌸','💜','🏡','✨','🌿'];
                    return (
                      <button key={i} onClick={() => { setForm(p => ({ ...p, house:i })); setAddStep(3); }}
                        style={{ ...btnReset, padding:'18px 20px', borderRadius:18, cursor:'pointer', textAlign:'left', transition:'all .18s',
                          background: sel ? '#1a1816' : CARD,
                          boxShadow: sel ? '0 4px 16px rgba(26,24,22,0.2)' : '0 1px 4px rgba(44,42,38,0.07)',
                          flexDirection:'row', alignItems:'center', gap:14,
                        }}>
                        <span style={{ fontSize:28 }}>{emojis[i % emojis.length]}</span>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:15, fontWeight:600, color: sel?'#f5f3ef':'#1a1816' }}>{h}</div>
                          <div style={{ fontSize:11, color: sel?'#a8a29e':'#a8a29e', marginTop:2 }}>{hCounts[i]} items already here</div>
                        </div>
                        {sel && <Check size={18} color={GOLD} strokeWidth={2.5}/>}
                      </button>
                    );
                  })}
                </div>

                <div style={{ marginTop:'auto', paddingTop:24 }}>
                  <button onClick={() => setAddStep(3)}
                    style={{ ...btnReset, width:'100%', padding:'15px', borderRadius:14, fontSize:14, fontWeight:600, cursor:'pointer',
                      background: '#1a1816', color:'#f5f3ef', justifyContent:'center',
                    }}>
                    Review →
                  </button>
                </div>
              </div>
            )}

            {/* ── STEP 3 — Summary ── */}
            {addStep === 3 && (
              <div style={{ flex:1, padding:'8px 20px 32px', display:'flex', flexDirection:'column' }}>
                <div style={{ marginBottom:20 }}>
                  <h2 className="serif" style={{ fontSize:26, fontWeight:600, color:'#1a1816', margin:'0 0 4px', letterSpacing:'-0.3px' }}>
                    {editingItem ? 'Edit item' : 'Looks good?'}
                  </h2>
                  <p style={{ fontSize:13, color:'#a8a29e', margin:0 }}>Tap any field to change it</p>
                </div>

                {/* Photo + title hero */}
                <div style={{ display:'flex', gap:14, marginBottom:20, padding:'16px', background:CARD, borderRadius:18, boxShadow:'0 1px 4px rgba(44,42,38,0.06)' }}>
                  <div style={{ flexShrink:0 }}>
                    <img src={form.photo || makeClothSvg(form.subType, form.color)} style={{ width:72, height:72, borderRadius:12, objectFit:'cover', background:'#F5F3EF' }}/>
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:17, fontWeight:600, color:'#1a1816', overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>{form.name || '—'}</div>
                    <div style={{ fontSize:12, color:'#a8a29e', marginTop:3 }}>
                      {[form.category, form.subType, form.color].filter(Boolean).join(' · ')}
                    </div>
                    <div style={{ fontSize:11, color:GOLD, fontWeight:600, marginTop:5, textTransform:'uppercase', letterSpacing:'0.06em' }}>
                      {houses[form.house]}
                    </div>
                  </div>
                </div>

                {/* Editable summary rows */}
                {[
                  { label:'Type', value: [form.category, form.subType].filter(Boolean).join(' / ') || 'Not set', step:0 },
                  { label:'Name', value: form.name || 'Not set', step:1 },
                  { label:'Color', value: form.color || 'Not set', step:1 },
                  { label:'Home', value: houses[form.house], step:2 },
                ].map(row => (
                  <button key={row.label} onClick={() => setAddStep(row.step)}
                    style={{ ...btnReset, width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'13px 0', borderBottom:'1px solid rgba(44,42,38,0.07)', cursor:'pointer' }}>
                    <span style={{ fontSize:12, color:'#a8a29e', fontWeight:500, minWidth:52 }}>{row.label}</span>
                    <span style={{ fontSize:13, color:'#1a1816', fontWeight:500, flex:1, textAlign:'left', marginLeft:12 }}>{row.value}</span>
                    <ChevronRight size={14} color="#c4b8a8" strokeWidth={1.8}/>
                  </button>
                ))}

                <div style={{ marginTop:'auto', paddingTop:28 }}>
                  <button onClick={handleSave} disabled={!form.name.trim() || !form.category || analyzing}
                    style={{ ...btnReset, width:'100%', padding:'16px', borderRadius:14, fontSize:14, fontWeight:600,
                      cursor: form.name.trim() && form.category ? 'pointer' : 'not-allowed',
                      background: form.name.trim() && form.category ? GOLD : '#e0d8cf',
                      color: form.name.trim() && form.category ? '#fff' : '#a8a29e',
                      justifyContent:'center', letterSpacing:'0.02em', transition:'all .15s',
                    }}>
                    {editingItem ? 'Save Changes' : '+ Add to Wardrobe'}
                  </button>
                </div>
              </div>
            )}

          </div>
        )}


        {/* ══ MOVE MODAL ══ */}
        {movingItem && (
          <div style={{ position:'fixed', inset:0, background:'rgba(26,24,22,0.42)', backdropFilter:'blur(4px)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:40 }}>
            <div style={{ background:CREAM, width:'100%', maxWidth:560, borderRadius:'26px 26px 0 0', padding:'22px 22px 30px' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                <button onClick={() => setMovingItem(null)} style={{ ...btnReset, padding:4, cursor:'pointer' }}><ChevronLeft size={18} color="#a8a29e" strokeWidth={1.8}/></button>
                <h2 className="serif" style={{ margin:0, fontSize:18, fontWeight:600, color:'#1a1816' }}>Move Item</h2>
                <div style={{ width:26 }}/>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:11, marginBottom:14, padding:'10px 12px', background:CARD, borderRadius:14 }}>
                {movingItem.photo && <img src={movingItem.photo} alt="" style={{ width:46, height:46, borderRadius:9, objectFit:'cover' }}/>}
                <div>
                  <div style={{ fontSize:13, fontWeight:500, color:'#1a1816' }}>{movingItem.name}</div>
                  <div style={{ fontSize:10, color:'#a8a29e', marginTop:1 }}>Currently at {houses[movingItem.house]}</div>
                </div>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
                {houses.map((h, i) => {
                  const cur = i === movingItem.house;
                  return (
                    <button key={i} onClick={() => handleMove(movingItem.id, i)} disabled={cur}
                      style={{ ...btnReset, padding:'13px 14px', borderRadius:13, background: cur ? '#f0ece8' : CARD, opacity: cur ? .55 : 1, cursor: cur ? 'not-allowed' : 'pointer', boxShadow: cur ? 'none' : '0 1px 4px rgba(44,42,38,0.06)', textAlign:'left', transition:'all .15s', width:'100%', justifyContent:'space-between', flexDirection:'row' }}>
                      <div>
                        <div style={{ fontSize:9, letterSpacing:'0.1em', textTransform:'uppercase', color:'#a8a29e', marginBottom:2 }}>Home {i+1}</div>
                        <div style={{ fontSize:13, fontWeight:500, color:'#1a1816' }}>{h}</div>
                        <div style={{ fontSize:10, color:'#a8a29e', marginTop:1 }}>{hCounts[i]} items</div>
                      </div>
                      {cur && <span style={{ fontSize:9, letterSpacing:'0.08em', textTransform:'uppercase', color:'#a8a29e' }}>Current</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ══ SETTINGS PANEL ══ */}
        {showSettings && (
          <div style={{ position:'fixed', inset:0, background:'rgba(26,24,22,0.42)', backdropFilter:'blur(4px)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:50 }}>
            <div style={{ background:CREAM, width:'100%', maxWidth:560, borderRadius:'26px 26px 0 0', padding:'22px 22px 34px', maxHeight:'90vh', overflowY:'auto' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:22 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <Settings size={15} color="#a8a29e" strokeWidth={1.8}/>
                  <h2 className="serif" style={{ margin:0, fontSize:18, fontWeight:600, color:'#1a1816' }}>Profile & Settings</h2>
                </div>
                <button onClick={() => setShowSettings(false)} style={{ ...btnReset, width:28, height:28, background:CARD, borderRadius:'50%', border:'1px solid rgba(44,42,38,0.1)', cursor:'pointer' }}>
                  <X size={13} color="#a8a29e" strokeWidth={2}/>
                </button>
              </div>

              {settingsPage === 'homes' ? (
                <ManageHomes
                  houses={houses} hCounts={hCounts}
                  onRename={renameHome} onAdd={addHome} onDelete={removeHome}
                  onBack={() => setSettingsPage('main')}
                />
              ) : settingsPage === 'categories' ? (
                <ManageCategories
                  categories={categories} catCounts={catCounts}
                  onAddCat={addCategory} onRemoveCat={removeCategory}
                  onSelectCat={(cat) => { setActiveCatEdit(cat); setSettingsPage('catDetail'); }}
                  onBack={() => setSettingsPage('main')}
                />
              ) : settingsPage === 'catDetail' && activeCatEdit ? (
                <CategoryDetail
                  catName={activeCatEdit}
                  types={categories[activeCatEdit] || []}
                  onRename={(old, nw) => renameCategory(old, nw)}
                  onAddType={(t) => addType(activeCatEdit, t)}
                  onRemoveType={(t) => removeType(activeCatEdit, t)}
                  onBack={() => setSettingsPage('categories')}
                />
              ) : (
                /* ── MAIN SETTINGS ── */
                <div>
                  {/* Profile card */}
                  <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:22, padding:'14px 16px', background:CARD, borderRadius:16, border:'1px solid rgba(44,42,38,0.07)' }}>
                    <div style={{ width:50, height:50, borderRadius:'50%', background:'#1a1816', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                      <span style={{ fontSize:15, fontWeight:600, color:'#f5f3ef', fontFamily:"'Fraunces',Georgia,serif" }}>{initials}</span>
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:15, fontWeight:600, color:'#1a1816', overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>{profile.name || 'Your Name'}</div>
                      <div style={{ fontSize:11, color:'#a8a29e', marginTop:2, overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>{session?.email}</div>
                    </div>
                  </div>
                  {/* Profile fields */}
                  <div style={{ marginBottom:20 }}>
                    <span style={labelStyle}>Display Name</span>
                    <input value={profile.name} onChange={e => saveProfile({ ...profile, name:e.target.value })} placeholder="Your name"
                      style={{ width:'100%', padding:'10px 12px', background:CARD, border:'1px solid rgba(44,42,38,0.1)', borderRadius:10, fontSize:13, color:'#1a1816', outline:'none', boxSizing:'border-box' }}/>
                  </div>

                  <div style={{ height:1, background:'rgba(44,42,38,0.07)', marginBottom:16 }}/>

                  {/* Nav rows */}
                  {[
                    { icon:<HomeIcon size={15} strokeWidth={1.8}/>, label:'Manage Homes', sub:`${houses.length} homes`, page:'homes' },
                    { icon:<Layers size={15} strokeWidth={1.8}/>, label:'Categories & Types', sub:`${Object.keys(categories).length} categories`, page:'categories' },
                  ].map(item => (
                    <button key={item.page} onClick={() => setSettingsPage(item.page)} style={{ ...btnReset, width:'100%', display:'flex', alignItems:'center', gap:12, padding:'13px 14px', borderRadius:12, background:CARD, marginBottom:8, border:'1px solid rgba(44,42,38,0.07)', textAlign:'left', cursor:'pointer', justifyContent:'flex-start' }}>
                      <div style={{ width:34, height:34, borderRadius:9, background:'#f5f3ef', display:'flex', alignItems:'center', justifyContent:'center', color:'#5c5652', flexShrink:0 }}>{item.icon}</div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, fontWeight:500, color:'#1a1816' }}>{item.label}</div>
                        <div style={{ fontSize:11, color:'#a8a29e', marginTop:1 }}>{item.sub}</div>
                      </div>
                      <ChevronRight size={15} color="#c4b8a8" strokeWidth={1.8}/>
                    </button>
                  ))}

                  <div style={{ height:1, background:'rgba(44,42,38,0.07)', margin:'14px 0' }}/>
                  {clothes.length === 0 && (
                    <button onClick={() => { seedData(); setShowSettings(false); }} style={{ ...btnReset, width:'100%', padding:'11px', fontSize:13, color:GOLD, fontWeight:500, cursor:'pointer', justifyContent:'center' }}>
                      Load Sample Data
                    </button>
                  )}
                  <button onClick={() => { if (confirm('Clear all wardrobe data?')) { saveClothes([]); setShowSettings(false); }}}
                    style={{ ...btnReset, width:'100%', padding:'11px', fontSize:13, color:'#c0392b', fontWeight:500, cursor:'pointer', justifyContent:'center' }}>
                    Clear All Data
                  </button>
                  <div style={{ height:1, background:'rgba(44,42,38,0.07)', margin:'6px 0 10px' }}/>
                  <button onClick={handleSignOut}
                    style={{ ...btnReset, width:'100%', padding:'12px 14px', borderRadius:12, background:CARD, border:'1px solid rgba(44,42,38,0.07)', cursor:'pointer', justifyContent:'flex-start', gap:10 }}>
                    <div style={{ width:34, height:34, borderRadius:9, background:'#fef2f2', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                      <LogOut size={15} color="#c0392b" strokeWidth={1.8}/>
                    </div>
                    <div style={{ flex:1, textAlign:'left' }}>
                      <div style={{ fontSize:13, fontWeight:500, color:'#c0392b' }}>Sign Out</div>
                      <div style={{ fontSize:11, color:'#a8a29e', marginTop:1 }}>Signed in as {session?.email}</div>
                    </div>
                  </button>
                </div>
              )}
            </div>
          </div>
        )}

      </div>
    </>
  );
}

// ─── MOUNT ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(WardrobeTracker)
);
</script>

<script>
if ('serviceWorker' in navigator) {
  fetch('/potli/sw.js', { method: 'HEAD' })
    .then(r => { if (r.ok) navigator.serviceWorker.register('/potli/sw.js'); })
    .catch(() => {});
}
</script>
</body>
</html>
